<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Login</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="bolt-icon"><i class="fas fa-bolt"></i></div>
                <h1 class="logo-text">TECH<span>STORE</span></h1>
                <p class="subtitle">لوحة التحكم - تسجيل الدخول</p>
            </div>
            
            <form id="loginForm">
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                    <i class="fas fa-eye show-pass" id="togglePassword" style="cursor: pointer;"></i>
                </div>
                <button type="submit" class="btn-login">
                    تسجيل الدخول <i class="fas fa-arrow-left"></i>
                </button>
            </form>

            <div class="secure-footer">
                <i class="fas fa-shield-alt"></i> لوحة تحكم آمنة ومُشفرة
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
