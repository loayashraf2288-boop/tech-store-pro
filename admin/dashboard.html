<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TechStore - لوحة التحكم</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="admin-profile">
            <img src="https://via.placeholder.com/50" alt="loay">
            <div>
                <h4>Loay</h4>
                <span>مدير النظام</span>
            </div>
        </div>
        <nav>
            <ul>
                <li class="active"><i class="fas fa-home"></i> الرئيسية</li>
                <li><i class="fas fa-shopping-bag"></i> الطلبات</li>
                <li><i class="fas fa-box"></i> المنتجات</li>
                <li><i class="fas fa-users"></i> العملاء</li>
                <li><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="dash-header">
            <h2>لوحة التحكم</h2>
            <p>مرحباً بك من جديد يا Loay 👋</p>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-box-open"></i>
                <h3>126</h3>
                <p>المنتجات</p>
            </div>
            <div class="stat-card blue">
                <i class="fas fa-users"></i>
                <h3>1,250</h3>
                <p>العملاء</p>
            </div>
            <div class="stat-card green">
                <i class="fas fa-shopping-cart"></i>
                <h3>320</h3>
                <p>الطلبات</p>
            </div>
            <div class="stat-card gold">
                <i class="fas fa-dollar-sign"></i>
                <h3>69,998</h3>
                <p>الأرباح</p>
            </div>
        </section>

        <div class="chart-container">
            <h3>توزيع المبيعات</h3>
            <div class="fake-chart"></div>
        </div>

    </main>

</body>
</html>
