<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin ⚡</title>

<style>
body{
    margin:0;
    background:#0b0b0f;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Background */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url("logo.png") center/cover no-repeat;
    opacity:0.1;
    z-index:-1;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    backdrop-filter:blur(15px);
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:10px;
    background:#00f0ff;
    border:none;
    border-radius:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="bg"></div>

<div class="box" id="login">
<h3>Admin Login</h3>
<input id="u" placeholder="User">
<input id="p" type="password" placeholder="Pass">
<button onclick="login()">دخول</button>
</div>

<div class="box hidden" id="panel">
<h3>إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">
<button onclick="addProduct()">إضافة</button>
</div>

<script>

function login(){
if(u.value=="loay" && p.value=="11211"){
login.style.display="none";
panel.classList.remove("hidden");
}else{
alert("بيانات غلط");
}
}

function addProduct(){
let products = JSON.parse(localStorage.getItem("products")) || [];

products.push({
name:name.value,
price:price.value,
img:img.value
});

localStorage.setItem("products",JSON.stringify(products));
alert("تمت الإضافة ✅");
}

</script>

</body>
</html>
