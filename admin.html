<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#0057FF;--bg:#050A14;--card:#0D1626;--text:#E8F0FF;}
body{font-family:'Cairo';background:var(--bg);color:var(--text);margin:0;display:flex;}
.sidebar{width:240px;background:var(--card);height:100vh;padding:20px;border-left:1px solid rgba(0,87,255,0.2);position:fixed;right:0;}
.main{margin-right:240px;padding:30px;width:100%;}
.btn{background:var(--primary);color:#fff;border:none;padding:12px 25px;border-radius:10px;cursor:pointer;font-weight:900;}
.input{width:100%;padding:12px;margin-bottom:15px;background:var(--bg);border:1px solid #222;border-radius:10px;color:#fff;}
.img-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.slot{aspect-ratio:1;border:2px dashed #333;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.slot img{width:100%;height:100%;object-fit:cover;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--primary);padding:10px 30px;border-radius:10px;display:none;z-index:9999;}
</style>
</head>
<body>

<div id="toast"></div>

<div class="sidebar">
  <h2 style="color:var(--primary)">TECHSTORE</h2>
  <div onclick="show('add')" style="padding:15px;cursor:pointer">➕ إضافة منتج</div>
  <div onclick="show('ads')" style="padding:15px;cursor:pointer">🖼️ الإعلانات</div>
  <div onclick="show('orders')" style="padding:15px;cursor:pointer">📦 الطلبات</div>
</div>

<div class="main">
  <div id="tab-add">
    <h2>إضافة منتج جديد</h2>
    <div style="background:var(--card);padding:25px;border-radius:20px">
      <input type="text" id="p-name" class="input" placeholder="اسم المنتج">
      <input type="number" id="p-price" class="input" placeholder="السعر">
      <textarea id="p-desc" class="input" placeholder="الوصف" rows="3"></textarea>
      <div class="img-grid" id="slots"></div>
      <button class="btn" style="width:100%;margin-top:20px" onclick="save()">حفظ المنتج</button>
    </div>
  </div>

  <div id="tab-ads" style="display:none">
    <h2>إدارة السلايدر</h2>
    <input type="file" id="ad-file" class="input" onchange="uploadAd(this)">
  </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let imgs = new Array(8).fill(null);

function toast(m){
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display='block';
  setTimeout(()=>t.style.display='none', 3000);
}

function build(){
  const g = document.getElementById('slots'); g.innerHTML='';
  for(let i=0; i<8; i++){
    const s = document.createElement('div'); s.className='slot';
    s.innerHTML = imgs[i] ? `<img src="${imgs[i]}">` : '+';
    s.onclick = () => {
      const inp = document.createElement('input'); inp.type='file';
      inp.onchange = e => {
        const r = new FileReader();
        r.onload = ev => { imgs[i] = ev.target.result; build(); };
        r.readAsDataURL(e.target.files[0]);
      };
      inp.click();
    };
    g.appendChild(s);
  }
}

async function save(){
  const data = {
    name: document.getElementById('p-name').value,
    price: document.getElementById('p-price').value,
    desc: document.getElementById('p-desc').value,
    img1: imgs[0], img2: imgs[1], img3: imgs[2], img4: imgs[3],
    img5: imgs[4], img6: imgs[5], img7: imgs[6], img8: imgs[7]
  };
  await fetch(`${DB}/products.json`, {method:'POST', body:JSON.stringify(data)});
  toast("تم الحفظ بنجاح! 🚀");
  location.reload();
}

async function uploadAd(inp){
  const r = new FileReader();
  r.onload = async e => {
    await fetch(`${DB}/ads.json`, {method:'POST', body:JSON.stringify({img: e.target.result})});
    toast("تم إضافة الإعلان! ✅");
  };
  r.readAsDataURL(inp.files[0]);
}

function show(t){
  document.getElementById('tab-add').style.display = t==='add'?'block':'none';
  document.getElementById('tab-ads').style.display = t==='ads'?'block':'none';
}

window.onload = build;
</script>
</body>
</html>
