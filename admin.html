<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TECHSTORE ADMIN - PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--bg:#050A14;--card:#0D1626;--text:#E8F0FF;--border:rgba(0,87,255,0.2);--danger:#FF3D57;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}

/* Sidebar for Mobile */
.sidebar{position:fixed;top:0;right:-260px;width:260px;height:100%;background:var(--card);border-left:1px solid var(--border);transition:0.4s;z-index:2000;display:flex;flex-direction:column;padding:20px;box-shadow:-10px 0 30px rgba(0,0,0,0.5);}
.sidebar.open{right:0;}
.nav-item{padding:15px;cursor:pointer;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:0.3s;color:#7A90B8;}
.nav-item:hover, .nav-item.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 5px 15px rgba(0,87,255,0.3);}

/* Main Layout */
.main-content{padding:20px;padding-top:80px;transition:0.4s;}
header{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(13,22,38,0.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1500;border-bottom:1px solid var(--border);}
.menu-btn{background:var(--primary);color:#fff;border:none;width:45px;height:45px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px var(--primary);}

/* Cards & Stats */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:15px;text-align:center;}
.stat-val{font-size:24px;font-weight:900;color:var(--primary);font-family:'Orbitron';}

/* Table Fix for Mobile */
.table-responsive{overflow-x:auto;background:var(--card);border-radius:15px;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{background:rgba(0,87,255,0.1);padding:12px;text-align:right;font-size:12px;color:var(--primary);}
td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;}

/* Form Fix */
.input-group{margin-bottom:15px;}
.input-group label{display:block;margin-bottom:8px;font-size:13px;color:var(--accent);}
input, textarea, select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;color:#fff;outline:none;font-size:14px;}
input:focus{border-color:var(--primary);box-shadow:0 0 10px var(--border);}

/* Image Slots Fix */
.img-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.slot{aspect-ratio:1;border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg);}
.slot img{width:100%;height:100%;object-fit:cover;position:absolute;}
.slot span{font-size:20px;color:var(--border);}

.btn-save{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;border-radius:15px;color:#fff;font-weight:900;font-size:16px;cursor:pointer;margin-top:10px;box-shadow:0 10px 25px rgba(0,87,255,0.4);}
</style>
</head>
<body>

<header>
    <div style="font-family:'Orbitron';font-weight:900;color:var(--primary);font-size:18px">TECHSTORE PRO</div>
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
</header>

<div class="sidebar" id="sidebar">
    <div style="padding:10px 0 30px;text-align:center;font-weight:900;color:var(--primary)">⚡ TECHSTORE PANEL</div>
    <div class="nav-item active" onclick="showTab('dashboard')"><i class="fas fa-chart-line"></i> الإحصائيات</div>
    <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus-circle"></i> إضافة منتج</div>
    <div class="nav-item" onclick="showTab('ads')"><i class="fas fa-image"></i> السلايدر</div>
    <div class="nav-item" onclick="showTab('orders')"><i class="fas fa-shopping-cart"></i> الطلبات</div>
    <div class="nav-item" onclick="showTab('coupons')"><i class="fas fa-ticket-alt"></i> الكوبونات</div>
    <div class="nav-item" style="color:var(--danger);margin-top:auto" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> خروج</div>
</div>

<div class="main-content">
    <div id="tab-dashboard" class="tab">
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-val" id="count-p">0</div><div>منتج</div></div>
            <div class="stat-box"><div class="stat-val" id="count-o">0</div><div>طلب</div></div>
        </div>
        <div class="card">
            <h3 style="margin-bottom:15px;color:var(--primary)">📦 إدارة المنتجات</h3>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>حذف</th></tr></thead>
                    <tbody id="products-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-add" class="tab" style="display:none">
        <div class="card">
            <h3 style="margin-bottom:20px;color:var(--primary)">➕ إضافة منتج جديد (8 صور)</h3>
            <div class="input-group"><label>اسم المنتج</label><input type="text" id="p-name" placeholder="مثال: iPhone 17 Pro Max"></div>
            <div class="input-group"><label>السعر بالجنيه</label><input type="number" id="p-price" placeholder="70000"></div>
            <div class="input-group"><label>وصف المنتج</label><textarea id="p-desc" rows="3" placeholder="اكتب تفاصيل المنتج هنا..."></textarea></div>
            <label style="display:block;margin-bottom:10px;font-size:13px;color:var(--accent)">ارفع الصور من ملفات الموبايل:</label>
            <div class="img-grid" id="slots"></div>
            <button class="btn-save" onclick="saveProduct()">حفظ ونشر المنتج ⚡</button>
        </div>
    </div>

    <div id="tab-ads" class="tab" style="display:none">
        <div class="card">
            <h3>🖼️ إعلانات السلايدر</h3>
            <input type="file" onchange="uploadAd(this)" style="margin:20px 0">
            <div id="ads-grid" class="img-grid"></div>
        </div>
    </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let imgData=new Array(8).fill(null);

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`); return await r.json();}
async function fbPush(p,d){await fetch(`${DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});}
async function fbDel(p){await fetch(`${DB}/${p}.json`,{method:'DELETE'});}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

function showTab(t){
    document.querySelectorAll('.tab').forEach(x=>x.style.display='none');
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.getElementById('tab-'+t).style.display='block';
    if(t==='dashboard') loadDashboard();
    toggleSidebar();
}

// Image Handling (File Reader)
function buildSlots(){
    const g=document.getElementById('slots'); g.innerHTML='';
    for(let i=0;i<8;i++){
        const s=document.createElement('div'); s.className='slot';
        s.innerHTML=imgData[i]?`<img src="${imgData[i]}">`:`<span>+</span>`;
        s.onclick=()=>{
            const inp=document.createElement('input'); inp.type='file';
            inp.onchange=e=>{
                const r=new FileReader();
                r.onload=ev=>{imgData[i]=ev.target.result; buildSlots();};
                r.readAsDataURL(e.target.files[0]);
            }; inp.click();
        }; g.appendChild(s);
    }
}

async function saveProduct(){
    const data={ name:document.getElementById('p-name').value, price:document.getElementById('p-price').value, desc:document.getElementById('p-desc').value };
    if(!data.name || !data.price) return alert("اكمل البيانات!");
    for(let i=0;i<8;i++) data[`img${i+1}`] = imgData[i];
    await fbPush('products', data); alert("تم الحفظ بنجاح! 🚀"); location.reload();
}

async function loadDashboard(){
    const data = await fbGet('products');
    const tbody = document.getElementById('products-list');
    const pCount = data?Object.keys(data).length:0;
    document.getElementById('count-p').textContent = pCount;
    tbody.innerHTML = data?Object.entries(data).map(([id,p])=>`
        <tr><td><img src="${p.img1}" style="width:40px;border-radius:8px"></td><td>${p.name}</td><td>${p.price}ج</td><td><i class="fas fa-trash" style="color:red" onclick="delItem('products/${id}')"></i></td></tr>
    `).join(''):'لا يوجد منتجات';
}

async function delItem(path){ if(confirm("حذف؟")){ await fbDel(path); location.reload(); } }

window.onload=()=>{ buildSlots(); loadDashboard(); };
</script>
</body>
</html>
