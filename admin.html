<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE - لوحة الإدارة المتقدمة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--primary-dark:#0040CC;--primary-glow:rgba(0,87,255,0.3);--accent:#00D4FF;--bg-dark:#050A14;--bg-card:#0D1626;--bg-card2:#111D35;--text:#E8F0FF;--text-muted:#7A90B8;--border:rgba(0,87,255,0.2);--success:#00E676;--warning:#FFB300;--danger:#FF3D57;--gold:#FFD700;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg-dark);}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}

/* TOAST */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none;}
.toast{background:linear-gradient(135deg,var(--bg-card2),#1a2a4a);border:1px solid var(--primary);border-radius:12px;padding:14px 24px;color:var(--text);font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,87,255,0.3);display:flex;align-items:center;gap:10px;min-width:280px;animation:toastIn 0.4s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;max-width:calc(100vw - 40px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.form-control{width:100%;background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;margin-bottom:12px;}

/* ADMIN LAYOUT */
#admin-page{display:none;}
.admin-wrap{display:flex;min-height:100vh;}
.sidebar{width:250px;background:var(--bg-card);border-left:1px solid var(--border);position:fixed;right:0;top:0;height:100%;z-index:100;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.nav-item{padding:13px 20px;cursor:pointer;font-weight:600;font-size:14px;color:var(--text-muted);display:flex;align-items:center;gap:10px;transition:all 0.2s;}
.nav-item:hover, .nav-item.active{background:rgba(0,87,255,0.12);color:var(--primary);border-right:3px solid var(--primary);}
.main-content{margin-right:250px;padding:30px;flex:1;}

/* TABS */
.tab{display:none;}.tab.active{display:block;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.btn{padding:10px 20px;border-radius:9px;border:none;cursor:pointer;font-family:'Cairo';font-weight:700;transition:0.3s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}

/* IMAGE UPLOAD */
.img-upload-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.img-upload-slot{aspect-ratio:1;border:2px dashed var(--border);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg-card2);}
.img-upload-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.remove-img{position:absolute;top:4px;left:4px;width:22px;height:22px;background:var(--danger);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:2;}

/* TABLE */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg-card2);padding:12px;font-size:13px;text-align:right;color:var(--text-muted);}
td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;}

/* MOBILE */
@media(max-width:768px){
  .sidebar{width:200px;}
  .main-content{margin-right:200px;}
}
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="login-page">
  <div class="login-box">
    <div style="font-family:'Orbitron';font-size:1.4rem;font-weight:900;margin-bottom:20px">TECHSTORE ADMIN</div>
    <input type="text" class="form-control" id="login-user" placeholder="اسم المستخدم">
    <input type="password" class="form-control" id="login-pass" placeholder="كلمة المرور">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">دخول</button>
  </div>
</div>

<div id="admin-page">
  <div class="admin-wrap">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div style="width:38px;height:38px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center">⚡</div>
        <div style="font-family:'Orbitron';font-weight:900">TECHSTORE</div>
      </div>
      
      <div style="padding:15px">
        <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" target="_blank" class="btn btn-primary" style="width:100%; font-size:12px; justify-content:center;">
          <i class="fas fa-download"></i> رابط الأبلكيشن
        </a>
      </div>

      <div class="nav-item active" onclick="showTab('dashboard')"><i class="fas fa-chart-bar"></i> الإحصائيات</div>
      <div class="nav-item" onclick="showTab('products')"><i class="fas fa-box"></i> المنتجات</div>
      <div class="nav-item" onclick="showTab('add-product')"><i class="fas fa-plus-circle"></i> إضافة منتج</div>
      <div class="nav-item" onclick="showTab('ads')"><i class="fas fa-ad"></i> السلايدر (الإعلانات)</div>
      <div class="nav-item" onclick="showTab('coupons')"><i class="fas fa-ticket-alt"></i> أكواد الخصم</div>
      <div class="nav-item" onclick="showTab('orders')"><i class="fas fa-shopping-bag"></i> الطلبات</div>
      <div class="nav-item" onclick="showTab('support')"><i class="fas fa-headset"></i> الدعم الفني</div>
      <div class="nav-item" onclick="doLogout()" style="color:var(--danger); margin-top:auto;"><i class="fas fa-sign-out-alt"></i> خروج</div>
    </div>

    <div class="main-content">
      
      <div class="tab active" id="tab-dashboard">
        <h2>الإحصائيات</h2>
        <div id="stats-area" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-top:20px;">
            </div>
      </div>

      <div class="tab" id="tab-products">
        <h2>المنتجات</h2>
        <div class="table-wrap" style="margin-top:20px">
          <table><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الطلبات</th><th>إجراء</th></tr></thead>
          <tbody id="products-tbody"></tbody></table>
        </div>
      </div>

      <div class="tab" id="tab-add-product">
        <h2 id="form-title">إضافة منتج بـ 8 صور</h2>
        <div class="card" style="margin-top:20px">
          <input type="hidden" id="edit-id">
          <input type="text" class="form-control" id="p-name" placeholder="اسم المنتج">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <input type="number" class="form-control" id="p-price" placeholder="السعر">
            <input type="text" class="form-control" id="p-cat" placeholder="القسم (موبايلات، لابتوبات...)">
          </div>
          <textarea class="form-control" id="p-desc" rows="3" placeholder="وصف المنتج"></textarea>
          
          <label style="display:block; margin:15px 0 10px; color:var(--primary); font-weight:bold;">رفع الصور (اختر ملفات من تلفونك):</label>
          <div class="img-upload-grid" id="img-slots"></div>
          
          <button class="btn btn-primary" style="width:100%; margin-top:20px; justify-content:center" onclick="saveProduct()">حفظ المنتج</button>
        </div>
      </div>

      <div class="tab" id="tab-ads">
        <h2>إدارة السلايدر (إعلانات الصفحة الرئيسية)</h2>
        <div class="card" style="margin-top:20px">
          <label>رفع صورة إعلان جديدة:</label>
          <input type="file" class="form-control" id="ad-file-input" onchange="uploadAdImage(this)">
          <div id="ads-list-grid" class="img-upload-grid" style="margin-top:20px"></div>
        </div>
      </div>

      <div class="tab" id="tab-coupons">
        <h2>أكواد الخصم</h2>
        <div class="card" style="margin-top:20px">
          <div style="display:grid; grid-template-columns:2fr 1fr 1fr; gap:10px">
            <input type="text" class="form-control" id="cp-code" placeholder="اسم الكود (مثال: LOAY20)">
            <input type="number" class="form-control" id="cp-perc" placeholder="النسبة %">
            <button class="btn btn-primary" onclick="addCoupon()">إضافة</button>
          </div>
        </div>
        <div class="table-wrap">
          <table><thead><tr><th>الكود</th><th>النسبة</th><th>حذف</th></tr></thead>
          <tbody id="coupons-tbody"></tbody></table>
        </div>
      </div>

      <div class="tab" id="tab-orders"><h2>الطلبات</h2><div class="table-wrap"><table id="orders-table"></table></div></div>
      <div class="tab" id="tab-support"><h2>الدعم الفني</h2><div id="support-area"></div></div>

    </div>
  </div>
</div>

<script>
const DB = "https://store-c8993-default-rtdb.firebaseio.com";
let imgData = new Array(8).fill(null);

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`); return await r.json();}
async function fbSet(p,d){await fetch(`${DB}/${p}.json`,{method:'PUT',body:JSON.stringify(d)});}
async function fbPush(p,d){const r=await fetch(`${DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)}); return await r.json();}
async function fbDel(p){await fetch(`${DB}/${p}.json`,{method:'DELETE'});}

function toast(msg,type='info'){
  const t=document.createElement('div'); t.className=`toast ${type}`;
  t.innerHTML=`<span>⚡</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

// LOGIN LOGIC
function doLogin(){
  const u=document.getElementById('login-user').value;
  const p=document.getElementById('login-pass').value;
  if(u==='loay' && p==='11211'){
    localStorage.setItem('admin','true');
    showAdmin();
  } else { toast('بيانات خاطئة!','error'); }
}
function showAdmin(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('admin-page').style.display='block';
  loadDashboard(); buildImgSlots();
}
function doLogout(){ localStorage.removeItem('admin'); location.reload(); }

// TABS
function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.currentTarget?.classList.add('active');
  if(name==='products') loadProducts();
  if(name==='ads') loadAds();
  if(name==='coupons') loadCoupons();
}

// IMAGE UPLOAD (FILE READING)
function buildImgSlots(){
  const grid = document.getElementById('img-slots'); grid.innerHTML='';
  for(let i=0; i<8; i++){
    const slot = document.createElement('div'); slot.className = 'img-upload-slot';
    if(imgData[i]){
      slot.innerHTML = `<img src="${imgData[i]}"><div class="remove-img" onclick="imgData[${i}]=null;buildImgSlots()">✕</div>`;
    } else {
      slot.innerHTML = `<i class="fas fa-camera"></i><input type="file" onchange="readImg(event,${i})">`;
    }
    grid.appendChild(slot);
  }
}
function readImg(e,i){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { imgData[i] = ev.target.result; buildImgSlots(); };
  reader.readAsDataURL(file);
}

// PRODUCTS
async function saveProduct(){
  const name=document.getElementById('p-name').value;
  const price=document.getElementById('p-price').value;
  if(!name || !price){ toast('أدخل الاسم والسعر!','warning'); return; }
  const data = {
    name, price, cat:document.getElementById('p-cat').value, desc:document.getElementById('p-desc').value,
    img1:imgData[0], img2:imgData[1], img3:imgData[2], img4:imgData[3],
    img5:imgData[4], img6:imgData[5], img7:imgData[6], img8:imgData[7],
    time: Date.now()
  };
  await fbPush('products', data);
  toast('تم حفظ المنتج بنجاح! ✅','success');
  location.reload();
}

async function loadProducts(){
  const data = await fbGet('products');
  const tbody = document.getElementById('products-tbody');
  tbody.innerHTML = data ? Object.entries(data).map(([id,p])=>`
    <tr>
      <td><img src="${p.img1}" style="width:40px; border-radius:5px"></td>
      <td>${p.name}</td>
      <td>${p.price} ج</td>
      <td>${p.orders||0}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteItem('products/${id}')">حذف</button></td>
    </tr>`).join('') : '';
}

// ADS (SLIDER)
async function uploadAdImage(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    await fbPush('ads', {img: e.target.result});
    toast('تم رفع صورة الإعلان! ✅');
    loadAds();
  };
  reader.readAsDataURL(file);
}
async function loadAds(){
  const data = await fbGet('ads');
  const grid = document.getElementById('ads-list-grid');
  grid.innerHTML = data ? Object.entries(data).map(([id,ad])=>`
    <div class="img-upload-slot">
        <img src="${ad.img}">
        <div class="remove-img" onclick="deleteItem('ads/${id}');loadAds()">✕</div>
    </div>`).join('') : '';
}

// COUPONS
async function addCoupon(){
  const code = document.getElementById('cp-code').value.toUpperCase();
  const perc = document.getElementById('cp-perc').value;
  if(!code || !perc) return;
  await fbSet(`coupons/${code}`, {perc});
  toast('تم تفعيل كود الخصم! 🎫');
  loadCoupons();
}
async function loadCoupons(){
  const data = await fbGet('coupons');
  const tbody = document.getElementById('coupons-tbody');
  tbody.innerHTML = data ? Object.entries(data).map(([code,c])=>`
    <tr><td>${code}</td><td>${c.perc}%</td><td><button class="btn btn-danger btn-sm" onclick="deleteItem('coupons/${code}');loadCoupons()">حذف</button></td></tr>
  `).join('') : '';
}

async function deleteItem(path){ if(confirm('متأكد؟')){ await fbDel(path); toast('تم الحذف'); } }

async function loadDashboard(){
    const [p,o,c] = await Promise.all([fbGet('products'), fbGet('orders'), fbGet('chats')]);
    document.getElementById('stats-area').innerHTML = `
        <div class="card" style="text-align:center"><div style="font-size:24px; font-weight:900; color:var(--primary)">${p?Object.keys(p).length:0}</div>منتج</div>
        <div class="card" style="text-align:center"><div style="font-size:24px; font-weight:900; color:var(--success)">${o?Object.keys(o).length:0}</div>طلب</div>
        <div class="card" style="text-align:center"><div style="font-size:24px; font-weight:900; color:var(--warning)">${c?Object.keys(c).length:0}</div>محادثة</div>
    `;
}

if(localStorage.getItem('admin')) showAdmin();
</script>
</body>
</html>
