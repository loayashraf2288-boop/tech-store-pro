<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE - الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--bg:#050A14;--card:#0D1626;--text:#E8F0FF;--border:rgba(0,87,255,0.2);}
body{font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); margin:0;}
.sidebar{width:250px; background:var(--card); height:100vh; position:fixed; right:0; border-left:1px solid var(--border); padding:20px;}
.main{margin-right:250px; padding:30px;}
.nav-item{padding:12px; cursor:pointer; border-radius:8px; margin-bottom:5px; transition:0.3s; display:flex; align-items:center; gap:10px;}
.nav-item:hover, .nav-item.active{background:var(--primary); color:#fff;}
.card{background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border); margin-bottom:20px;}
table{width:100%; border-collapse:collapse; background:var(--card); border-radius:10px; overflow:hidden;}
th, td{padding:12px; text-align:right; border-bottom:1px solid var(--border); font-size:14px;}
.btn{padding:8px 15px; border-radius:5px; border:none; cursor:pointer; font-weight:700;}
.modal{position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:2000;}
.modal.open{display:flex;}
.modal-content{background:var(--card); padding:25px; border-radius:15px; width:90%; max-width:500px;}
@media(max-width:768px){ .sidebar{display:none;} .main{margin-right:0;} }
</style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary)">TECHSTORE</h2>
    <div class="nav-item active" onclick="showTab('products')"><i class="fas fa-box"></i> المنتجات</div>
    <div class="nav-item" onclick="showTab('orders')"><i class="fas fa-shopping-bag"></i> الطلبات</div>
    <div class="nav-item" onclick="showTab('coupons')"><i class="fas fa-percentage"></i> أكواد الخصم</div>
</div>

<div class="main">
    <div id="tab-products" class="tab-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>إدارة المنتجات</h2>
            <button class="btn" style="background:var(--primary); color:#fff" onclick="alert('استخدم فورم الإضافة الأصلية عندك')">إضافة منتج</button>
        </div>
        <div id="products-list"></div>
    </div>

    <div id="tab-orders" class="tab-content" style="display:none">
        <h2>الطلبات الواردة</h2>
        <table>
            <thead><tr><th>العميل</th><th>الموبايل</th><th>الإجمالي</th><th>التفاصيل</th></tr></thead>
            <tbody id="orders-tbody"></tbody>
        </table>
    </div>

    <div id="tab-coupons" class="tab-content" style="display:none">
        <h2>أكواد الخصم</h2>
        <div class="card">
            <input type="text" id="cp-name" placeholder="اسم الكود (SAVE20)" style="padding:10px; border-radius:5px; border:1px solid var(--border); background:#000; color:#fff;">
            <input type="number" id="cp-val" placeholder="النسبة (0.20 للـ 20%)" style="padding:10px; border-radius:5px; border:1px solid var(--border); background:#000; color:#fff;">
            <button class="btn" style="background:var(--primary); color:#fff" onclick="addCoupon()">إضافة كود</button>
        </div>
        <div id="coupons-list"></div>
    </div>
</div>

<div class="modal" id="order-modal">
    <div class="modal-content">
        <h3 id="m-order-name"></h3>
        <div id="m-order-items" style="margin:15px 0;"></div>
        <button class="btn" style="background:var(--primary); width:100%; color:#fff" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allOrders={};

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`);return await r.json();}

async function loadOrders(){
    const data = await fbGet('orders'); allOrders = data || {};
    const tbody = document.getElementById('orders-tbody');
    tbody.innerHTML = Object.entries(allOrders).reverse().map(([id, o])=>`
        <tr>
            <td>${o.name}</td>
            <td>${o.phone}</td>
            <td>${o.total} ج</td>
            <td><button class="btn" style="background:var(--primary); color:#fff" onclick="viewOrder('${id}')">عرض الصور</button></td>
        </tr>
    `).join('');
}

function viewOrder(id){
    const o = allOrders[id];
    document.getElementById('m-order-name').textContent = `طلب: ${o.name}`;
    document.getElementById('m-order-items').innerHTML = o.items.map(it=>`
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;">
            <img src="${it.img1}" style="width:50px; height:50px; object-fit:cover; border-radius:5px;">
            <div><div>${it.name}</div><div style="font-size:12px; color:gray">السعر: ${it.price} ج</div></div>
        </div>
    `).join('');
    document.getElementById('order-modal').classList.add('open');
}

async function addCoupon(){
    const name = document.getElementById('cp-name').value.trim().toUpperCase();
    const val = document.getElementById('cp-val').value;
    if(!name || !val) return alert('أكمل البيانات');
    await fetch(`${DB}/coupons/${name}.json`, {method:'PUT', body:JSON.stringify({value: parseFloat(val)})});
    alert('تمت الإضافة'); loadCoupons();
}

async function loadCoupons(){
    const data = await fbGet('coupons');
    document.getElementById('coupons-list').innerHTML = data ? Object.entries(data).map(([n, v])=>`
        <div class="card" style="display:flex; justify-content:space-between">
            <span>${n} (${v.value * 100}%)</span>
            <button onclick="deleteCoupon('${n}')" style="color:red; background:none; border:none; cursor:pointer">حذف</button>
        </div>`).join('') : 'لا توجد أكواد';
}

async function deleteCoupon(n){ if(confirm('حذف؟')) { await fetch(`${DB}/coupons/${n}.json`, {method:'DELETE'}); loadCoupons(); } }

function showTab(t){
    document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
    document.getElementById(`tab-${t}`).style.display='block';
    if(t==='orders') loadOrders();
    if(t==='coupons') loadCoupons();
}

function closeModal(){ document.getElementById('order-modal').classList.remove('open'); }

window.onload = () => loadOrders();
</script>
</body>
</html>
