<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TECHSTORE ADMIN - PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--accent:#00D4FF;--bg:#050A14;--card:#0D1626;--text:#E8F0FF;--border:rgba(0,87,255,0.2);--danger:#FF3D57;--success:#00E676;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}

/* TOAST */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none;width:90%;max-width:360px;}
.toast{background:var(--card);border:1px solid var(--primary);border-radius:12px;padding:14px 20px;color:var(--text);font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;width:100%;animation:toastIn 0.4s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* LOGIN PAGE */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;max-width:100%;text-align:center;}
.form-control{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:#fff;margin-bottom:15px;outline:none;font-size:14px;}

/* ADMIN PANEL */
#admin-page{display:none;}
header{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(13,22,38,0.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1500;border-bottom:1px solid var(--border);}
.sidebar{position:fixed;top:0;right:-260px;width:260px;height:100%;background:var(--card);border-left:1px solid var(--border);transition:0.4s;z-index:2000;display:flex;flex-direction:column;padding:20px;}
.sidebar.open{right:0;}
.main-content{padding:20px;padding-top:90px;}
.nav-item{padding:15px;cursor:pointer;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;color:#7A90B8;}
.nav-item.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;}
.menu-btn{background:var(--primary);color:#fff;border:none;width:45px;height:45px;border-radius:10px;cursor:pointer;}
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="login-page">
  <div class="login-box">
    <div style="width:64px;height:64px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px">⚡</div>
    <h2 style="font-family:'Orbitron';margin-bottom:20px;color:var(--primary)">TECHSTORE ADMIN</h2>
    <input type="text" class="form-control" id="login-user" placeholder="اسم المستخدم (loay)">
    <input type="password" class="form-control" id="login-pass" placeholder="كلمة المرور (11211)">
    <button onclick="doLogin()" style="width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:900;cursor:pointer">دخول</button>
  </div>
</div>

<div id="admin-page">
  <header>
    <div style="font-family:'Orbitron';font-weight:900;color:var(--primary)">TECHSTORE PRO</div>
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="nav-item active" onclick="showTab('dashboard')">الإحصائيات</div>
    <div class="nav-item" onclick="showTab('add')">إضافة منتج</div>
    <div class="nav-item" onclick="showTab('orders')">الطلبات</div>
    <div class="nav-item" style="color:var(--danger);margin-top:auto" onclick="doLogout()">خروج</div>
  </div>

  <div class="main-content">
    <div id="tab-dashboard" class="tab">
        <h2>لوحة المعلومات</h2>
        <p>جاري تحميل البيانات...</p>
    </div>
    <div id="tab-add" class="tab" style="display:none">
        <h2>إضافة منتج</h2>
        </div>
  </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";

function toast(m,t='info'){
    const c=document.getElementById('toast-container');
    const d=document.createElement('div'); d.className=`toast ${t}`;
    d.innerHTML=`<span>⚡</span> ${m}`; c.appendChild(d);
    setTimeout(()=>d.remove(),3000);
}

function doLogin(){
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    
    console.log("Attempting login with:", u, p); // للـ Debug

    if(u === 'loay' && p === '11211'){
        localStorage.setItem('ts_admin_logged', 'true');
        toast('تم تسجيل الدخول بنجاح ✅', 'success');
        showAdmin();
    } else {
        toast('بيانات الدخول غير صحيحة! ❌', 'error');
    }
}

function showAdmin(){
    document.getElementById('login-page').style.display='none';
    document.getElementById('admin-page').style.display='block';
    // هنا استدعي دوال التحميل بتاعتك
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

function doLogout(){
    localStorage.removeItem('ts_admin_logged');
    location.reload();
}

// التأكد من حالة الجلسة عند فتح الصفحة
window.onload = () => {
    if(localStorage.getItem('ts_admin_logged') === 'true'){
        showAdmin();
    }
};
</script>
</body>
</html>
