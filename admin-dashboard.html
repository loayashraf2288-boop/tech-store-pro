<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHSTORE | لوحة التحكم</title>
    <script>
        if (localStorage.getItem('techstore_admin_logged_in') !== 'true') {
            window.location.href = "admin-login.html";
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        :root {
            --bg-dark: #030812;
            --panel-bg: #0a1324;
            --border-color: #1a2a44;
            --primary-blue: #0066ff;
            --text-light: #ffffff;
            --text-gray: #8892b0;
            --danger-red: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 250px; background: var(--panel-bg); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-menu li { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: var(--text-gray); transition: 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { color: var(--text-light); border-right: 3px solid var(--primary-blue); background: rgba(0, 102, 255, 0.1); }
        .badge { background: var(--primary-blue); padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: auto; }

        /* Main Content */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* Tables & UI */
        .card { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: right; padding: 12px; border-bottom: 1px solid var(--border-color); }
        .btn { padding: 8px 15px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .btn-add { background: var(--primary-blue); color: white; }
        .btn-del { background: var(--danger-red); color: white; }

        /* Chat UI */
        #chat-box { height: 300px; overflow-y: auto; background: var(--bg-dark); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; max-width: 80%; }
        .msg.admin { background: var(--primary-blue); margin-right: auto; }
        .msg.user { background: var(--border-color); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 30px;"><i class="fa-solid fa-bolt" style="color:var(--primary-blue)"></i> TECHSTORE</div>
        <ul class="sidebar-menu">
            <li class="active" onclick="showSection('home')"><i class="fa-solid fa-house"></i> الرئيسية</li>
            <li onclick="showSection('orders')"><i class="fa-solid fa-bag-shopping"></i> الطلبات <span class="badge" id="order-count">0</span></li>
            <li onclick="showSection('products')"><i class="fa-solid fa-box"></i> المنتجات</li>
            <li onclick="showSection('chat')"><i class="fa-solid fa-comments"></i> الشات المباشر</li>
            <li onclick="showSection('settings')"><i class="fa-solid fa-gear"></i> الإعدادات</li>
        </ul>
        <button class="btn" style="margin: auto 20px 20px; background:transparent; border:1px solid var(--danger-red); color:var(--danger-red)" onclick="logout()">تسجيل خروج</button>
    </aside>

    <main class="main-content">
        <div id="home" class="section active">
            <h2>إحصائيات النظام</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px;">
                <div class="card"><h4>المنتجات</h4><h1 id="stat-products">0</h1></div>
                <div class="card"><h4>الطلبات</h4><h1 id="stat-orders">0</h1></div>
                <div class="card"><h4>الأرباح</h4><h1 id="stat-revenue">0 ج</h1></div>
            </div>
        </div>

        <div id="products" class="section">
            <div class="card">
                <h3>إضافة منتج جديد</h3>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px;">
                    <input type="text" id="pName" placeholder="الاسم" style="padding:10px; border-radius:8px; background:#000; color:#fff; border:1px solid var(--border-color)">
                    <input type="number" id="pPrice" placeholder="السعر" style="padding:10px; border-radius:8px; background:#000; color:#fff; border:1px solid var(--border-color)">
                    <select id="pIcon" style="padding:10px; border-radius:8px; background:#000; color:#fff; border:1px solid var(--border-color)">
                        <option value="fa-solid fa-mobile-screen">هواتف</option>
                        <option value="fa-solid fa-laptop">لابتوبات</option>
                        <option value="fa-solid fa-headphones">سماعات</option>
                    </select>
                    <button class="btn btn-add" onclick="addProduct()">حفظ المنتج</button>
                </div>
            </div>
            <div class="card">
                <h3>المنتجات الحالية</h3>
                <table id="products-table">
                    <thead><tr><th>المنتج</th><th>السعر</th><th>الأيقونة</th><th>إدارة</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="orders" class="section">
            <div class="card">
                <h3>الطلبات الواردة</h3>
                <table id="orders-table">
                    <thead><tr><th>اسم العميل</th><th>التفاصيل</th><th>الإجمالي</th><th>التاريخ</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="chat" class="section">
            <div class="card">
                <h3>دعم العملاء المباشر</h3>
                <div id="chat-box"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="اكتب ردك هنا..." style="flex:1; padding:10px; border-radius:8px; background:#000; color:#fff; border:1px solid var(--border-color)">
                    <button class="btn btn-add" onclick="sendChat()">إرسال</button>
                </div>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        function logout() {
            localStorage.removeItem('techstore_admin_logged_in');
            window.location.href = "admin-login.html";
        }
    </script>
</body>
</html>
