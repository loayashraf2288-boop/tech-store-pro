openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TECHSTORE API
servers:
  - url: /api
tags:
  - name: health
  - name: catalog
  - name: cart
  - name: wishlist
  - name: orders
  - name: chat
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /categories:
    get:
      operationId: listCategories
      tags: [catalog]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }

  /banners:
    get:
      operationId: listBanners
      tags: [catalog]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Banner" }

  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      parameters:
        - in: query
          name: categoryId
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: onSale
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }

  /products/{id}:
    get:
      operationId: getProduct
      tags: [catalog]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductDetail" }

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [catalog]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }
    delete:
      operationId: clearCart
      tags: [cart]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }

  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddToCartBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }

  /cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCartItemBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }
    delete:
      operationId: removeCartItem
      tags: [cart]
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }

  /cart/coupon:
    post:
      operationId: applyCoupon
      tags: [cart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cart" }

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }
    post:
      operationId: toggleWishlist
      tags: [wishlist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrderBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }

  /me:
    get:
      operationId: getMe
      tags: [orders]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerProfile" }

  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatMessage" }
    post:
      operationId: sendChatMessage
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, mode]
              properties:
                text: { type: string }
                mode: { type: string, enum: [ai, agent] }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatMessage" }

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }

  /admin/stats:
    get:
      operationId: adminStats
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminStats" }

  /admin/sales-chart:
    get:
      operationId: adminSalesChart
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [label, value]
                  properties:
                    label: { type: string }
                    value: { type: number }

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }

  /admin/orders/{id}:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [new, processing, delivered, cancelled] }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }
    post:
      operationId: adminCreateProduct
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertProductBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertProductBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
    post:
      operationId: adminCreateCategory
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertCategoryBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }

  /admin/customers:
    get:
      operationId: adminListCustomers
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Customer" }

  /admin/admins:
    get:
      operationId: adminListAdmins
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUser" }
    post:
      operationId: adminCreateAdmin
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }

  /admin/admins/{id}:
    delete:
      operationId: adminDeleteAdmin
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /admin/coupons:
    get:
      operationId: adminListCoupons
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Coupon" }
    post:
      operationId: adminCreateCoupon
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, percentOff]
              properties:
                code: { type: string }
                percentOff: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Coupon" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Category:
      type: object
      required: [id, name, slug, icon]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        icon: { type: string }

    Banner:
      type: object
      required: [id, title, subtitle, ctaText, imageUrl]
      properties:
        id: { type: integer }
        title: { type: string }
        subtitle: { type: string }
        discount: { type: string }
        ctaText: { type: string }
        imageUrl: { type: string }

    Product:
      type: object
      required: [id, name, price, rating, reviewCount, images, categoryId, stock]
      properties:
        id: { type: integer }
        name: { type: string }
        price: { type: number }
        originalPrice: { type: number, nullable: true }
        discountPercent: { type: integer, nullable: true }
        rating: { type: number }
        reviewCount: { type: integer }
        isNew: { type: boolean }
        isBestSeller: { type: boolean }
        images:
          type: array
          items: { type: string }
        categoryId: { type: integer }
        categoryName: { type: string }
        stock: { type: integer }
        shortDescription: { type: string }

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          required: [description, colors, storageOptions, reviews]
          properties:
            description: { type: string }
            colors:
              type: array
              items:
                type: object
                required: [name, hex]
                properties:
                  name: { type: string }
                  hex: { type: string }
            storageOptions:
              type: array
              items: { type: string }
            reviews:
              type: array
              items: { $ref: "#/components/schemas/Review" }

    Review:
      type: object
      required: [id, author, rating, comment, createdAt]
      properties:
        id: { type: integer }
        author: { type: string }
        avatar: { type: string }
        rating: { type: integer }
        comment: { type: string }
        createdAt: { type: string }

    CartItem:
      type: object
      required: [id, productId, name, price, image, quantity]
      properties:
        id: { type: string }
        productId: { type: integer }
        name: { type: string }
        price: { type: number }
        image: { type: string }
        quantity: { type: integer }
        color: { type: string, nullable: true }
        storage: { type: string, nullable: true }

    Cart:
      type: object
      required: [items, subtotal, discount, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        subtotal: { type: number }
        discount: { type: number }
        total: { type: number }
        couponCode: { type: string, nullable: true }

    AddToCartBody:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer }
        quantity: { type: integer }
        color: { type: string }
        storage: { type: string }

    UpdateCartItemBody:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer }

    CreateOrderBody:
      type: object
      required: [fullName, address, phone, governorate]
      properties:
        fullName: { type: string }
        address: { type: string }
        apartment: { type: string }
        landmark: { type: string }
        floor: { type: string }
        houseNumber: { type: string }
        building: { type: string }
        district: { type: string }
        governorate: { type: string }
        phone: { type: string }
        notes: { type: string }
        paymentMethod: { type: string }

    Order:
      type: object
      required: [id, orderNumber, status, total, itemCount, createdAt, items]
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        status: { type: string }
        total: { type: number }
        itemCount: { type: integer }
        createdAt: { type: string }
        customerName: { type: string }
        customerAvatar: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }

    CustomerProfile:
      type: object
      required: [name, joinedAt, avatar, stats]
      properties:
        name: { type: string }
        email: { type: string }
        avatar: { type: string }
        joinedAt: { type: string }
        stats:
          type: object
          required: [total, processing, delivered, totalSpent]
          properties:
            total: { type: integer }
            processing: { type: integer }
            delivered: { type: integer }
            totalSpent: { type: number }

    ChatMessage:
      type: object
      required: [id, role, text, createdAt]
      properties:
        id: { type: integer }
        role: { type: string, enum: [user, ai, agent] }
        author: { type: string }
        avatar: { type: string }
        text: { type: string }
        createdAt: { type: string }

    AdminUser:
      type: object
      required: [id, username]
      properties:
        id: { type: integer }
        username: { type: string }
        avatar: { type: string }

    AdminStats:
      type: object
      required: [products, customers, orders, profit, sales, salesByCategory, topProducts, lowStock, recentOrders]
      properties:
        products:
          type: object
          required: [value, change]
          properties:
            value: { type: integer }
            change: { type: integer }
        customers:
          type: object
          required: [value, change]
          properties:
            value: { type: integer }
            change: { type: integer }
        orders:
          type: object
          required: [value, change]
          properties:
            value: { type: integer }
            change: { type: integer }
        profit:
          type: object
          required: [value, change]
          properties:
            value: { type: number }
            change: { type: integer }
        sales:
          type: object
          required: [value, change]
          properties:
            value: { type: number }
            change: { type: integer }
        salesByCategory:
          type: array
          items:
            type: object
            required: [name, percent]
            properties:
              name: { type: string }
              percent: { type: integer }
        topProducts:
          type: array
          items:
            type: object
            required: [id, name, image, soldCount]
            properties:
              id: { type: integer }
              name: { type: string }
              image: { type: string }
              soldCount: { type: integer }
        lowStock:
          type: array
          items:
            type: object
            required: [id, name, image, stock]
            properties:
              id: { type: integer }
              name: { type: string }
              image: { type: string }
              stock: { type: integer }
        recentOrders:
          type: array
          items: { $ref: "#/components/schemas/Order" }

    UpsertProductBody:
      type: object
      required: [name, price, categoryId, stock, images]
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        originalPrice: { type: number }
        categoryId: { type: integer }
        stock: { type: integer }
        isNew: { type: boolean }
        images:
          type: array
          items: { type: string }
        colors:
          type: array
          items:
            type: object
            required: [name, hex]
            properties:
              name: { type: string }
              hex: { type: string }
        storageOptions:
          type: array
          items: { type: string }

    UpsertCategoryBody:
      type: object
      required: [name, slug, icon]
      properties:
        name: { type: string }
        slug: { type: string }
        icon: { type: string }

    Customer:
      type: object
      required: [id, name, ordersCount, totalSpent, joinedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        avatar: { type: string }
        ordersCount: { type: integer }
        totalSpent: { type: number }
        joinedAt: { type: string }

    Coupon:
      type: object
      required: [id, code, percentOff, active]
      properties:
        id: { type: integer }
        code: { type: string }
        percentOff: { type: integer }
        active: { type: boolean }
