<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل المنتج — TechStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#04080f;--bg2:#080e1c;--blue:#1565ff;--neon:#00b4ff;--text:#e2f0ff;--muted:#5a7a9a;--border:rgba(21,101,255,0.18);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;padding:20px;}
        .container{max-width:800px;margin:50px auto;background:var(--bg2);padding:30px;border-radius:20px;border:1px solid var(--border);display:grid;grid-template-columns:1fr 1.2fr;gap:30px;}
        .img-box img{width:100%;border-radius:15px;border:1px solid var(--border);}
        .info-box h2{font-size:28px;margin-bottom:15px;color:var(--neon);}
        .price{font-size:24px;font-weight:900;color:var(--text);margin-bottom:20px;}
        .btn-add{width:100%;padding:15px;background:var(--blue);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:16px;}
        .back-btn{display:inline-block;margin-bottom:20px;color:var(--muted);text-decoration:none;font-size:14px;}
        @media(max-width:600px){.container{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← العودة للمتجر</a>
    <div class="container" id="product-details">
        <p>جاري التحميل...</p>
    </div>

    <script>
        const DB = "https://store-33acf-default-rtdb.firebaseio.com";
        const params = new URLSearchParams(window.location.search);
        const pid = params.get('id');

        async function loadProduct() {
            const r = await fetch(`${DB}/products/${pid}.json`);
            const p = await r.json();
            if(!p) { document.body.innerHTML = "المنتج غير موجود"; return; }

            document.getElementById('product-details').innerHTML = `
                <div class="img-box">
                    <img src="${p.image || 'https://via.placeholder.com/400'}" alt="${p.name}">
                </div>
                <div class="info-box">
                    <h2>${p.name}</h2>
                    <p class="price">${p.price.toLocaleString()} جنيه</p>
                    <p style="color:var(--muted); margin-bottom:30px; line-height:1.6;">هذا المنتج متوفر الآن بجودة عالية مع ضمان TechStore. يمكنك طلبه الآن ليصلك في أسرع وقت.</p>
                    <button class="btn-add" onclick="buyNow('${p.id}', '${p.name}', ${p.price})">اطلب الآن 🛒</button>
                </div>
            `;
        }

        function buyNow(id, name, price) {
            // توجيه العميل للسلة في الصفحة الرئيسية مع إضافة المنتج
            let cart = JSON.parse(localStorage.getItem('ts_cart') || '[]');
            cart.push({id, name, price});
            localStorage.setItem('ts_cart', JSON.stringify(cart));
            location.href = 'index.html?openCart=true';
        }
        loadProduct();
    </script>
</body>
</html>
