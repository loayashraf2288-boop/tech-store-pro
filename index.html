<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore — المتجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#04080f;--bg2:#080e1c;--bg3:#0c1528;--bg4:#101d36;--blue:#1565ff;--blue2:#2979ff;--neon:#00b4ff;--text:#e2f0ff;--muted:#5a7a9a;--border:rgba(21,101,255,0.18);--success:#00d68f;--danger:#ff4466;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
        .container{max-width:1200px;margin:0 auto;padding:20px;}
        header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid var(--border);}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:30px;}
        .card{background:var(--bg3);border-radius:15px;padding:15px;border:1px solid var(--border);transition:0.3s;text-align:center;}
        .card img{width:100%;height:200px;object-fit:cover;border-radius:10px;margin-bottom:15px;}
        .btn-buy{width:100%;padding:10px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:700;transition:0.3s;}
        .btn-buy:hover{background:var(--blue2);}
        /* Checkout Modal */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
        .modal-content{background:var(--bg2);padding:25px;border-radius:20px;width:95%;max-width:500px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);}
        .input-group{margin-bottom:12px;}
        .input-group label{display:block;margin-bottom:5px;font-size:13px;color:var(--muted);}
        .input-group input{width:100%;padding:12px;background:var(--bg4);border:1px solid var(--border);color:white;border-radius:8px;font-family:inherit;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="font-weight:900;">⚡ TECH<span style="color:var(--neon)">STORE</span></h1>
            <div id="cart-info" style="cursor:pointer; background:var(--bg3); padding:10px 20px; border-radius:10px; border:1px solid var(--border);">🛒 السلة (0)</div>
        </header>
        <div class="grid" id="products-grid"></div>
    </div>

    <div class="modal" id="checkout-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; color:var(--neon);">📝 تفاصيل الشحن</h3>
            <div class="input-group"><label>الاسم الكامل</label><input id="c-name" type="text" placeholder="أحمد محمد..."></div>
            <div class="input-group"><label>رقم الهاتف (واتساب)</label><input id="c-phone" type="text" placeholder="01xxxxxxxxx"></div>
            <div class="form-row">
                <div class="input-group"><label>المحافظة</label><input id="c-area" type="text" placeholder="القاهرة"></div>
                <div class="input-group"><label>المنطقة/الشارع</label><input id="c-street" type="text" placeholder="المعادي"></div>
            </div>
            <div class="form-row">
                <div class="input-group"><label>رقم العمارة</label><input id="c-building" type="text" placeholder="15"></div>
                <div class="input-group"><label>رقم الشقة/الدور</label><input id="c-flat" type="text" placeholder="شقة 4"></div>
            </div>
            <div class="input-group"><label>أقرب مكان مميز (علامة معروفة)</label><input id="c-landmark" type="text" placeholder="بجوار صيدلية..."></div>
            <button class="btn-buy" onclick="confirmOrder()" style="margin-top:10px;">تأكيد الطلب وإرسال عبر واتساب ✅</button>
            <button onclick="document.getElementById('checkout-modal').style.display='none'" style="background:none; border:none; color:var(--muted); margin-top:15px; cursor:pointer; width:100%;">إلغاء</button>
        </div>
    </div>

    <script>
        const DB = "https://store-33acf-default-rtdb.firebaseio.com";
        let products = [];
        let cart = [];

        async function loadProducts() {
            const r = await fetch(`${DB}/products.json`);
            const data = await r.json();
            if(data) {
                products = Object.entries(data).map(([id, v]) => ({id, ...v}));
                render();
            }
        }

        function render() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.image || 'https://via.placeholder.com/250'}" alt="${p.name}">
                    <h4 style="margin-bottom:10px;">${p.name}</h4>
                    <p style="color:var(--neon); font-weight:900; margin-bottom:15px;">${p.price.toLocaleString()} جنيه</p>
                    <button class="btn-buy" onclick="addToCart('${p.id}')">أضف للسلة 🛒</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            document.getElementById('cart-info').innerHTML = `🛒 السلة (${cart.length}) | إتمام الطلب`;
            document.getElementById('cart-info').onclick = openCheckout;
        }

        function openCheckout() { 
            if(cart.length === 0) return alert('السلة فارغة!');
            document.getElementById('checkout-modal').style.display='flex'; 
        }

        async function confirmOrder() {
            const details = {
                name: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                area: document.getElementById('c-area').value,
                street: document.getElementById('c-street').value,
                building: document.getElementById('c-building').value,
                flat: document.getElementById('c-flat').value,
                landmark: document.getElementById('c-landmark').value
            };

            if(!details.name || !details.phone || !details.area) return alert('برجاء ملء البيانات الأساسية');
            
            const fullAddress = `المحافظة: ${details.area}, المنطقة: ${details.street}, عمارة: ${details.building}, شقة: ${details.flat}, علامة مميزة: ${details.landmark}`;
            const total = cart.reduce((s,i) => s + i.price, 0);
            
            const order = {
                customer: details.name,
                phone: details.phone,
                address: fullAddress,
                items: cart,
                total: total,
                status: 'جديد',
                date: new Date().toLocaleString('ar-EG')
            };

            // 1. تسجيل في لوحة التحكم
            await fetch(`${DB}/orders.json`, { method: 'POST', body: JSON.stringify(order) });

            // 2. إرسال للواتساب الخاص بك
            const msg = `🚀 *طلب جديد من TechStore*%0A%0A*العميل:* ${details.name}%0A*الهاتف:* ${details.phone}%0A*العنوان:* ${fullAddress}%0A%0A*المنتجات:*%0A${cart.map(i=>`- ${i.name}`).join('%0A')}%0A%0A*الإجمالي:* ${total} جنيه`;
            window.open(`https://wa.me/201121189810?text=${msg}`, '_blank');
            
            alert('شكراً لك! تم تسجيل طلبك وتحويلك للواتساب.');
            location.reload();
        }
        loadProducts();
    </script>
</body>
</html>
