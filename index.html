<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECHSTORE | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        :root { --bg-color: #030812; --panel-bg: #0a1324; --border-color: #1a2a44; --primary-blue: #0066ff; --text-light: #ffffff; --neon-glow: 0 0 15px rgba(0, 102, 255, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-light); overflow-x: hidden; }
        
        /* App Bar */
        .top-app-bar { background: #000; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; border-bottom: 1px solid var(--primary-blue); }
        .app-btn { padding: 4px 12px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 11px; background: var(--primary-blue); color: #fff; }

        /* Header */
        header { background: var(--panel-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; gap: 10px; }
        .logo { font-size: 22px; font-weight: 800; color: #fff; }
        .logo i { color: var(--primary-blue); text-shadow: var(--neon-glow); }
        .search-bar { flex: 1; position: relative; }
        .search-bar input { width: 100%; padding: 8px 35px 8px 15px; border-radius: 20px; background: var(--bg-color); border: 1px solid var(--border-color); color: #fff; outline: none; }
        .search-bar i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #8892b0; }
        .nav-icons { display: flex; gap: 15px; }
        .cart-trigger { position: relative; cursor: pointer; font-size: 1.2rem; }
        .badge { background: var(--primary-blue); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; position: absolute; top: -10px; right: -10px; }

        /* Banner & Grid */
        .container { padding: 15px; }
        .hero { background: linear-gradient(135deg, #0a1324, #001f4d); border-radius: 15px; padding: 25px; text-align: center; border: 1px solid var(--primary-blue); margin-bottom: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .product-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; position: relative; }
        .product-img { height: 100px; background: #030812; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 10px; }
        .product-price { color: var(--primary-blue); font-weight: bold; margin: 10px 0; }
        .btn-add { width: 100%; background: var(--primary-blue); color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Sidebar Cart */
        .sidebar-cart { width: 100%; max-width: 320px; background: var(--panel-bg); position: fixed; right: 0; top: 0; height: 100vh; z-index: 1000; padding: 20px; border-left: 1px solid var(--border-color); display: none; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: var(--panel-bg); padding: 20px; border-radius: 15px; width: 100%; max-width: 380px; border: 1px solid var(--primary-blue); }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; background: #030812; border: 1px solid var(--border-color); color: #fff; outline: none; }

        /* AI Chat */
        #ai-btn { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; cursor: pointer; z-index: 999; box-shadow: var(--neon-glow); border: none; }
        #ai-window { display: none; position: fixed; bottom: 85px; right: 20px; width: 300px; height: 400px; background: var(--panel-bg); border: 1px solid var(--primary-blue); border-radius: 15px; z-index: 999; flex-direction: column; overflow: hidden; box-shadow: var(--neon-glow); }
    </style>
</head>
<body>

    <div class="top-app-bar">
        <div>حمل تطبيق TECHSTORE الآن!</div>
        <div class="app-buttons">
            <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" class="app-btn">Android <i class="fa-brands fa-android"></i></a>
        </div>
    </div>

    <header>
        <div class="logo"><i class="fa-solid fa-bolt"></i> TECHSTORE</div>
        <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" placeholder="ابحث هنا..."></div>
        <div class="nav-icons">
            <div class="cart-trigger" id="openCart"><i class="fa-solid fa-cart-shopping"></i><span class="badge cart-count">0</span></div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>عروض الصيف الكبرى</h1>
            <div style="font-size: 3rem; font-weight: 800; color: var(--primary-blue);">50%</div>
            <button class="btn-add" style="width: auto; padding: 10px 30px; margin-top: 10px;">تسوق الآن</button>
        </div>
        <div class="products-grid" id="productsContainer">
            </div>
    </div>

    <aside class="sidebar-cart" id="cartSidebar">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
            <h3>السلة</h3><i class="fa-solid fa-xmark" id="closeCart" style="cursor: pointer;"></i>
        </div>
        <div id="cartItems" style="margin-top: 15px; flex: 1; overflow-y: auto;"></div>
        <div style="padding-top: 15px; border-top: 1px solid var(--border-color);">
            <div style="display: flex; justify-content: space-between;"><span>الإجمالي:</span><span id="cartTotal">0 جنيه</span></div>
            <button class="btn-add" style="margin-top: 10px;" onclick="openCheckout()">إتمام الطلب</button>
        </div>
    </aside>

    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <h3 style="text-align: center; margin-bottom: 15px;">بيانات التوصيل</h3>
            <input type="text" id="custName" class="modal-input" placeholder="الاسم بالكامل">
            <input type="tel" id="custPhone" class="modal-input" placeholder="رقم الموبايل">
            <textarea id="custAddress" class="modal-input" placeholder="العنوان بالتفصيل" rows="3"></textarea>
            <button class="btn-add" id="confirmOrderBtn" onclick="confirmCheckout()">تأكيد الطلب <i class="fa-brands fa-whatsapp"></i></button>
            <button class="btn-add" style="background: none; margin-top: 10px; color: #8892b0;" onclick="closeCheckout()">إلغاء</button>
        </div>
    </div>

    <button id="ai-btn"><i class="fa-solid fa-robot"></i></button>
    <div id="ai-window">
        <div style="background: var(--primary-blue); padding: 10px; text-align: center; font-size: 14px; font-weight: bold;">خدمة العملاء AI</div>
        <div id="ai-messages" style="flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 8px;"></div>
        <div style="padding: 10px; border-top: 1px solid var(--border-color); display: flex; gap: 5px;">
            <input type="text" id="ai-input" placeholder="اسألني أي حاجة..." style="flex: 1; background: #030812; border: 1px solid var(--border-color); color: #fff; padding: 8px; border-radius: 5px;">
            <button onclick="askAI()" style="background: var(--primary-blue); border: none; color: #fff; padding: 0 10px; border-radius: 5px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="store.js"></script>
    <script src="ai-service.js"></script>
</body>
</html>
