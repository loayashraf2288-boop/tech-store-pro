<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TECHSTORE - Premium Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* نفس الستايل بتاعك بالظبط */
:root{--primary:#0057FF;--primary-dark:#0040CC;--primary-glow:rgba(0,87,255,0.3);--accent:#00D4FF;--bg-dark:#050A14;--bg-card:#0D1626;--bg-card2:#111D35;--text:#E8F0FF;--text-muted:#7A90B8;--border:rgba(0,87,255,0.2);--success:#00E676;--warning:#FFB300;--danger:#FF3D57;--gold:#FFD700;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}

/* TOAST */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;align-items:center;width:90%;max-width:360px;}
.toast{background:linear-gradient(135deg,var(--bg-card2),#1a2a4a);border:1px solid var(--primary);border-radius:12px;padding:14px 24px;color:var(--text);font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,87,255,0.3);display:flex;align-items:center;gap:10px;width:100%;animation:toastIn 0.4s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* بنر التحميل المضاف */
.app-dl-banner{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:12px;text-align:center;font-weight:bold;font-size:13px;display:flex;justify-content:center;align-items:center;gap:10px;cursor:pointer;}

/* التعديلات المطلوبة للـ Nav */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(5,10,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
.search-box{flex:1;max-width:400px;position:relative;margin:0 10px;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 35px;color:#fff;outline:none;}
.search-box i{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

/* باقي الاستايلات بتاعتك */
.slider-section{margin-top:60px;height:350px;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:0.8s;display:flex;align-items:center;justify-content:center;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:20px;}
.product-card{background:var(--bg-card);border-radius:15px;border:1px solid var(--border);overflow:hidden;transition:0.3s;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-card);border-radius:20px;width:100%;max-width:500px;padding:25px;}

@media(max-width:600px){ .logo-text{display:none;} .search-box{max-width:160px;} }
</style>
</head>
<body>

<div id="loader" style="position:fixed;inset:0;background:var(--bg-dark);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-size:2rem;color:var(--primary);">⚡ TECHSTORE</div>

<div id="toast-container"></div>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="location.reload()"><div class="logo-icon" style="width:35px;height:35px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;">⚡</div><div class="logo-text" style="margin-right:8px;font-weight:900;">TECHSTORE</div></div>
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="بحث عن منتج..." oninput="liveSearch(this.value)"></div>
    <div class="nav-actions" style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="openDL()"><i class="fas fa-download"></i></button>
      <button class="btn btn-outline" onclick="openCart()" style="position:relative;"><i class="fas fa-shopping-cart"></i><span id="cart-badge" style="position:absolute;top:-5px;right:-5px;background:red;font-size:10px;padding:2px 5px;border-radius:50%;display:none;">0</span></button>
    </div>
  </div>
</nav>

<div class="slider-section" id="main-slider"></div>

<div style="padding:20px;">
  <h2 style="margin-bottom:20px;border-right:4px solid var(--primary);padding-right:15px;font-size:1.2rem;">جميع المنتجات</h2>
  <div id="products-grid" class="products-grid"></div>
</div>

<div class="modal-overlay" id="dl-modal" onclick="closeDL()">
  <div class="modal" onclick="event.stopPropagation()" style="text-align:center;">
    <h3 style="margin-bottom:20px;">تحميل التطبيق الرسمي 📱</h3>
    <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" download class="btn btn-primary" style="display:block;padding:15px;text-decoration:none;margin-bottom:10px;border-radius:15px;font-weight:900;">
      <i class="fab fa-android"></i> تحميل للأندرويد (APK)
    </a>
    <div style="background:var(--bg-card2);padding:15px;border-radius:15px;opacity:0.5;position:relative;overflow:hidden;">
        <i class="fab fa-apple"></i> نسخة الأيفون (قريباً)
        <div style="position:absolute;top:5px;right:-15px;background:var(--primary);font-size:9px;padding:2px 15px;transform:rotate(45deg)">COMING</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="cart-modal" onclick="closeCart()">
  <div class="modal" style="max-width:450px;" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px;">سلة التسوق</h3>
    <div id="cart-items" style="max-height:250px;overflow-y:auto;margin-bottom:15px;"></div>
    
    <div style="display:flex;gap:8px;margin-bottom:15px;">
        <input type="text" id="coupon-input" placeholder="كود الخصم" style="flex:1;background:var(--bg-dark);border:1px solid var(--border);border-radius:10px;padding:10px;color:#fff;">
        <button class="btn btn-primary" onclick="applyCoupon()">تطبيق</button>
    </div>

    <div style="display:flex;justify-content:space-between;font-weight:900;font-size:1.2rem;margin-bottom:15px;">
        <span>الإجمالي:</span><span id="cart-total">0</span><span>ج</span>
    </div>
    
    <input type="text" id="c-name" placeholder="الاسم" style="width:100%;padding:12px;margin-bottom:10px;background:var(--bg-dark);border:1px solid var(--border);color:#fff;border-radius:10px;">
    <input type="tel" id="c-phone" placeholder="رقم الموبايل" style="width:100%;padding:12px;margin-bottom:15px;background:var(--bg-dark);border:1px solid var(--border);color:#fff;border-radius:10px;">
    
    <button class="btn btn-primary" style="width:100%;padding:15px;font-weight:900;" onclick="confirmOrder()">تأكيد الطلب (واتساب)</button>
  </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allProducts={}, cart=[], discount=0;

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`);return await r.json();}
async function fbPush(p,d){await fetch(`${DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});}

function toast(m){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span>⚡</span> ${m}`;c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

async function load(){
  const [p, a] = await Promise.all([fbGet('products'), fbGet('ads')]);
  allProducts=p||{};
  renderSlider(a);
  renderProds();
  document.getElementById('loader').style.display='none';
}

function renderSlider(ads){
  const s=document.getElementById('main-slider');
  if(!ads) return;
  s.innerHTML=Object.values(ads).map((ad,i)=>`<div class="slide ${i===0?'active':''}"><img src="${ad.img}"></div>`).join('');
  let cur=0; setInterval(()=>{
    const slides=document.querySelectorAll('.slide');
    if(slides.length<2) return;
    slides[cur].classList.remove('active');
    cur=(cur+1)%slides.length;
    slides[cur].classList.add('active');
  },4000);
}

function renderProds(){
  document.getElementById('products-grid').innerHTML=Object.entries(allProducts).map(([id,p])=>`
    <div class="product-card" onclick="addToCart('${id}')">
      <img src="${p.img1}" style="width:100%;aspect-ratio:1;object-fit:cover;">
      <div style="padding:10px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:5px;">${p.name}</div>
        <div style="color:var(--primary);font-weight:900;">${Number(p.price).toLocaleString()} ج</div>
      </div>
    </div>`).join('');
}

function addToCart(id){
  cart.push(allProducts[id]); updateCartUI();
  toast("تمت الإضافة للسلة! ✅");
}

async function applyCoupon(){
    const code = document.getElementById('coupon-input').value.toUpperCase();
    const data = await fbGet(`coupons/${code}`);
    if(data){ discount = parseInt(data.perc); toast(`تم تطبيق خصم ${discount}% 🎉`); updateCartUI(); }
    else{ toast("كود غير صحيح!"); discount=0; updateCartUI(); }
}

function updateCartUI(){
  document.getElementById('cart-badge').style.display=cart.length?'block':'none';
  document.getElementById('cart-badge').textContent=cart.length;
  let total=cart.reduce((s,c)=>s+parseInt(c.price),0);
  if(discount>0) total = total - (total * discount / 100);
  document.getElementById('cart-total').textContent=total.toLocaleString();
  document.getElementById('cart-items').innerHTML=cart.map(c=>`<div style="font-size:12px;margin-bottom:5px;">● ${c.name} - ${c.price}ج</div>`).join('');
}

async function confirmOrder(){
  const n=document.getElementById('c-name').value;
  const ph=document.getElementById('c-phone').value;
  if(!n||!ph){toast("اكمل البيانات!");return;}
  let total=cart.reduce((s,c)=>s+parseInt(c.price),0);
  if(discount>0) total = total - (total * discount / 100);
  await fbPush('orders',{name:n,phone:ph,total,items:cart.map(c=>c.name),time:new Date().toLocaleString()});
  const msg=encodeURIComponent(`🛒 طلب جديد\n👤 الاسم: ${n}\n📱 الموبايل: ${ph}\n📦 المنتجات: ${cart.map(c=>c.name).join(', ')}\n💰 الإجمالي: ${total} ج`);
  window.open(`https://wa.me/201121189810?text=${msg}`);
  cart=[];discount=0;updateCartUI();closeCart();
}

function openDL(){document.getElementById('dl-modal').classList.add('open');}
function closeDL(){document.getElementById('dl-modal').classList.remove('open');}
function openCart(){document.getElementById('cart-modal').classList.add('open');}
function closeCart(){document.getElementById('cart-modal').classList.remove('open');}

window.onload=load;
</script>
</body>
</html>
