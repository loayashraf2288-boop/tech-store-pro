<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE - Premium Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--primary-glow:rgba(0,87,255,0.4);--bg-dark:#050A14;--bg-card:#0D1626;--text:#E8F0FF;--border:rgba(0,87,255,0.2);--success:#00E676;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}

/* TOAST SYSTEM */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;}
.toast{background:#0D1626;border:1px solid var(--primary);border-radius:12px;padding:12px 24px;color:#fff;box-shadow:0 0 20px var(--primary-glow);display:flex;align-items:center;gap:10px;animation:fadeInDown 0.4s;}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(5,10,20,0.9);backdrop-filter:blur(15px);border-bottom:1px solid var(--border);height:70px;display:flex;align-items:center;padding:0 20px;}
.nav-inner{max-width:1400px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Orbitron';font-weight:900;color:var(--primary);font-size:1.4rem;cursor:pointer;}

/* SLIDER */
.slider{height:400px;margin-top:70px;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:0.8s;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;}

/* DOWNLOAD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:400px;text-align:center;}
.dl-card{background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:20px;border-radius:15px;text-decoration:none;display:block;transition:0.3s;}
.dl-card:hover{border-color:var(--primary);transform:translateY(-5px);}

/* THUMBS */
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.thumb{aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.thumb.active{border-color:var(--primary);}
</style>
</head>
<body>

<div id="toast-container"></div>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="location.reload()">⚡ TECHSTORE</div>
    <div style="display:flex;gap:15px">
      <button class="btn" onclick="openDL()" style="background:var(--primary);color:#fff;border:none;padding:8px 15px;border-radius:10px;cursor:pointer"><i class="fas fa-download"></i> التطبيق</button>
      <button onclick="openCart()" style="background:none;border:none;color:#fff;font-size:20px;position:relative"><i class="fas fa-shopping-cart"></i><span id="cart-count" style="position:absolute;top:-5px;right:-10px;background:red;font-size:10px;padding:2px 5px;border-radius:50%">0</span></button>
    </div>
  </div>
</nav>

<div class="slider" id="slider"></div>

<div style="padding:40px 20px">
  <h2 style="margin-bottom:20px;color:var(--primary)">🔥 أحدث العروض</h2>
  <div id="products-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px"></div>
</div>

<div class="modal-overlay" id="dl-modal">
  <div class="modal-box">
    <h3 style="margin-bottom:20px">تحميل تطبيق TECHSTORE 📱</h3>
    <div style="display:grid;gap:15px">
      <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" download class="dl-card">
        <i class="fab fa-android" style="font-size:40px;color:var(--success)"></i>
        <div style="color:#fff;margin-top:10px;font-weight:700">Android (تحميل مباشر)</div>
      </a>
      <div class="dl-card" style="opacity:0.5;cursor:not-allowed" onclick="toast('قريباً جداً على App Store 🍏','info')">
        <i class="fab fa-apple" style="font-size:40px"></i>
        <div style="color:#fff;margin-top:10px;font-weight:700">iOS (قريباً)</div>
      </div>
    </div>
    <button onclick="closeDL()" style="margin-top:20px;background:none;border:none;color:var(--text);text-decoration:underline;cursor:pointer">إغلاق</button>
  </div>
</div>

<div class="modal-overlay" id="p-modal">
  <div class="modal-box" style="max-width:800px;text-align:right">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" id="modal-content">
      </div>
    <button onclick="closeP()" style="margin-top:20px;width:100%;background:var(--primary);border:none;padding:12px;color:#fff;border-radius:10px">إغلاق</button>
  </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allProducts = {}, cart = [];

function toast(msg, type='success'){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast animate__animated animate__fadeInDown';
  t.innerHTML = `<span>⚡</span> ${msg}`;
  c.appendChild(t);
  setTimeout(()=> t.remove(), 3000);
}

async function load(){
  const [p, a] = await Promise.all([fetch(`${DB}/products.json`).then(r=>r.json()), fetch(`${DB}/ads.json`).then(r=>r.json())]);
  allProducts = p || {};
  renderProds();
  renderSlider(a);
}

function renderSlider(ads){
  const s = document.getElementById('slider');
  if(!ads) return;
  const items = Object.values(ads);
  s.innerHTML = items.map((ad,i)=>`<div class="slide ${i===0?'active':''}"><img src="${ad.img}"></div>`).join('');
  let cur = 0;
  setInterval(()=>{
    const slides = document.querySelectorAll('.slide');
    slides[cur].classList.remove('active');
    cur = (cur+1)%slides.length;
    slides[cur].classList.add('active');
  }, 4000);
}

function renderProds(){
  const g = document.getElementById('products-grid');
  g.innerHTML = Object.entries(allProducts).map(([id,p])=>`
    <div onclick="openP('${id}')" style="background:var(--bg-card);border-radius:15px;overflow:hidden;border:1px solid var(--border);cursor:pointer">
      <img src="${p.img1}" style="width:100%;aspect-ratio:1;object-fit:cover">
      <div style="padding:15px">
        <div style="font-weight:700;font-size:14px">${p.name}</div>
        <div style="color:var(--primary);font-weight:900;margin-top:5px">${p.price} ج</div>
      </div>
    </div>`).join('');
}

function openP(id){
  const p = allProducts[id];
  const imgs = [p.img1, p.img2, p.img3, p.img4, p.img5, p.img6, p.img7, p.img8].filter(Boolean);
  document.getElementById('modal-content').innerHTML = `
    <div>
      <img id="main-m-img" src="${p.img1}" style="width:100%;border-radius:15px;aspect-ratio:1;object-fit:cover">
      <div class="thumb-grid">${imgs.map(img=>`<img src="${img}" class="thumb" onclick="document.getElementById('main-m-img').src='${img}'">`).join('')}</div>
    </div>
    <div>
      <h2 style="color:var(--primary)">${p.name}</h2>
      <div style="font-size:24px;font-weight:900;margin:15px 0">${p.price} جنيه</div>
      <p style="color:#aaa;line-height:1.6">${p.desc || 'لا يوجد وصف.'}</p>
      <button onclick="addCart('${id}')" style="width:100%;margin-top:20px;background:var(--primary);color:#fff;border:none;padding:15px;border-radius:10px;font-weight:900;cursor:pointer">أضف للسلة 🛒</button>
    </div>`;
  document.getElementById('p-modal').classList.add('open');
}

function addCart(id){
  cart.push(allProducts[id]);
  document.getElementById('cart-count').textContent = cart.length;
  toast("تمت الإضافة للسلة بنجاح! ✅");
  closeP();
}

function openDL(){ document.getElementById('dl-modal').classList.add('open'); }
function closeDL(){ document.getElementById('dl-modal').classList.remove('open'); }
function closeP(){ document.getElementById('p-modal').classList.remove('open'); }
function openCart(){ toast("السلة بتتحضر للربط بالواتساب.. استعد!", "info"); }

window.onload = load;
</script>
</body>
</html>
