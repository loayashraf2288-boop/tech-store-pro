<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TECHSTORE - المتجر الرئيسي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--bg-dark:#050A14;--bg-card:#0D1626;--text:#E8F0FF;--border:rgba(0,87,255,0.2);--success:#00E676;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}

/* NAV - Responsive Fix */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(5,10,20,0.9);backdrop-filter:blur(15px);border-bottom:1px solid var(--border);height:70px;display:flex;align-items:center;padding:0 15px;}
.nav-inner{max-width:1400px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Orbitron';font-weight:900;color:var(--primary);font-size:1.2rem;cursor:pointer;}
.search-box{flex:1;max-width:300px;position:relative;margin:0 10px;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 35px 8px 10px;color:#fff;font-size:12px;outline:none;}
.search-box i{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#777;}

/* SLIDER */
.slider{height:250px;margin-top:70px;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:0.8s;display:flex;align-items:center;justify-content:center;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;}

/* PRODUCTS GRID - Responsive */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:15px;}
.product-card{background:var(--bg-card);border-radius:12px;overflow:hidden;border:1px solid var(--border);transition:0.3s;}
.product-card:hover{transform:translateY(-5px);border-color:var(--primary);}
.product-card img{width:100%;aspect-ratio:1;object-fit:cover;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;align-items:center;justify-content:center;padding:15px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:20px;width:100%;max-width:400px;text-align:center;}

/* TOAST */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;}
.toast{background:#0D1626;border:1px solid var(--primary);border-radius:12px;padding:10px 20px;color:#fff;box-shadow:0 0 15px var(--primary);animation:fadeInDown 0.4s;}

@media(max-width:480px){
  .logo{font-size:1rem;}
  .search-box{max-width:140px;}
}
</style>
</head>
<body>

<div id="toast-container"></div>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="location.reload()">⚡ TECHSTORE</div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="بحث..." oninput="liveSearch(this.value)">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="openDL()" style="background:var(--primary);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer"><i class="fas fa-download"></i></button>
      <button onclick="openCart()" style="background:none;border:1px solid var(--border);color:#fff;padding:8px 12px;border-radius:8px;position:relative;cursor:pointer">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" style="position:absolute;top:-5px;right:-5px;background:red;font-size:10px;padding:2px 5px;border-radius:50%;display:none">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="slider" id="slider"></div>

<div style="padding:20px">
  <h2 style="margin-bottom:15px;border-right:4px solid var(--primary);padding-right:10px;font-size:1.2rem">أحدث المنتجات</h2>
  <div id="products-grid" class="products-grid"></div>
</div>

<div class="modal-overlay" id="dl-modal" onclick="closeDL()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:20px">تحميل التطبيق 📱</h3>
    <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" download class="btn" style="background:var(--primary);color:#fff;display:block;padding:15px;border-radius:12px;text-decoration:none;font-weight:bold;margin-bottom:10px">
        <i class="fab fa-android"></i> تحميل للأندرويد (APK)
    </a>
    <div style="background:var(--bg-card);border:1px solid var(--border);padding:15px;border-radius:12px;opacity:0.5;position:relative;overflow:hidden">
        <i class="fab fa-apple"></i> الأيفون (قريباً)
        <div style="position:absolute;top:5px;right:-15px;background:var(--primary);font-size:9px;padding:2px 15px;transform:rotate(45deg)">COMING</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="cart-modal" onclick="closeCart()">
  <div class="modal-box" style="max-width:500px;text-align:right" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px">سلة المشتريات</h3>
    <div id="cart-items" style="max-height:200px;overflow-y:auto;margin-bottom:15px"></div>
    
    <div style="display:flex;gap:5px;margin-bottom:15px">
        <input type="text" id="coupon-input" placeholder="كود الخصم" style="flex:1;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;padding:8px;color:#fff">
        <button onclick="applyCoupon()" style="background:var(--primary);border:none;padding:0 15px;border-radius:8px;color:#fff">تطبيق</button>
    </div>

    <div style="font-weight:bold;font-size:1.2rem;margin-bottom:15px">الإجمالي: <span id="cart-total">0</span> جنيه</div>
    
    <input type="text" id="c-name" class="input" placeholder="الاسم" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-dark);color:#fff">
    <input type="tel" id="c-phone" class="input" placeholder="رقم الموبايل" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-dark);color:#fff">
    
    <button onclick="confirmOrder()" style="width:100%;background:var(--primary);border:none;padding:15px;border-radius:12px;color:#fff;font-weight:bold">تأكيد الطلب عبر واتساب</button>
  </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allProducts={}, cart=[], discount=0;

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`); return await r.json();}
async function fbPush(p,d){await fetch(`${DB}/${p}.json`,{method:'POST',body:JSON.stringify(d)});}

function toast(msg){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<span>⚡</span> ${msg}`;
  c.appendChild(t); setTimeout(()=>t.remove(), 3000);
}

async function load(){
  const [p, a] = await Promise.all([fbGet('products'), fbGet('ads')]);
  allProducts=p||{};
  renderSlider(a);
  renderProds();
}

function renderSlider(ads){
  const s=document.getElementById('slider');
  if(!ads) return;
  const items=Object.values(ads);
  s.innerHTML=items.map((ad,i)=>`<div class="slide ${i===0?'active':''}"><img src="${ad.img}"></div>`).join('');
  let cur=0;
  setInterval(()=>{
    const slides=document.querySelectorAll('.slide');
    if(slides.length<2) return;
    slides[cur].classList.remove('active');
    cur=(cur+1)%slides.length;
    slides[cur].classList.add('active');
  }, 4000);
}

function renderProds(){
  const g=document.getElementById('products-grid');
  g.innerHTML=Object.entries(allProducts).map(([id,p])=>`
    <div class="product-card" onclick="addToCart('${id}')">
      <img src="${p.img1}">
      <div style="padding:10px">
        <div style="font-weight:700;font-size:13px">${p.name}</div>
        <div style="color:var(--primary);font-weight:900;margin-top:5px">${Number(p.price).toLocaleString()} ج</div>
      </div>
    </div>`).join('');
}

function addToCart(id){
  cart.push(allProducts[id]);
  updateCartUI();
  toast("تمت الإضافة للسلة! ✅");
}

async function applyCoupon(){
    const code = document.getElementById('coupon-input').value.toUpperCase();
    const data = await fbGet(`coupons/${code}`);
    if(data){
        discount = parseInt(data.perc);
        toast(`تم تطبيق خصم ${discount}% 🎉`);
        updateCartUI();
    } else { toast("كود غير صحيح!"); discount=0; updateCartUI(); }
}

function updateCartUI(){
    document.getElementById('cart-count').style.display = cart.length?'flex':'none';
    document.getElementById('cart-count').textContent = cart.length;
    let total = cart.reduce((s,c)=>s+parseInt(c.price),0);
    if(discount>0) total = total - (total * discount / 100);
    document.getElementById('cart-total').textContent = total.toLocaleString();
    document.getElementById('cart-items').innerHTML = cart.map(c=>`<div style="font-size:12px;margin-bottom:5px">● ${c.name} - ${c.price}ج</div>`).join('');
}

async function confirmOrder(){
    const name=document.getElementById('c-name').value;
    const phone=document.getElementById('c-phone').value;
    if(!name||!phone){ toast("اكمل البيانات!"); return; }
    let total = cart.reduce((s,c)=>s+parseInt(c.price),0);
    if(discount>0) total = total - (total * discount / 100);
    const orderData = { name, phone, items: cart.map(c=>c.name), total, time: new Date().toLocaleString() };
    await fbPush('orders', orderData);
    const msg = encodeURIComponent(`🛒 طلب جديد\n👤 الاسم: ${name}\n📱 الموبايل: ${phone}\n📦 المنتجات: ${cart.map(c=>c.name).join(', ')}\n💰 الإجمالي: ${total} ج`);
    window.open(`https://wa.me/201121189810?text=${msg}`);
    cart=[]; updateCartUI(); closeCart();
}

function openDL(){ document.getElementById('dl-modal').classList.add('open'); }
function closeDL(){ document.getElementById('dl-modal').classList.remove('open'); }
function openCart(){ document.getElementById('cart-modal').classList.add('open'); }
function closeCart(){ document.getElementById('cart-modal').classList.remove('open'); }

window.onload=load;
</script>
</body>
</html>
