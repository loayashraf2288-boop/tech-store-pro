<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE - Premium Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--primary-dark:#0040CC;--primary-glow:rgba(0,87,255,0.3);--accent:#00D4FF;--bg-dark:#050A14;--bg-card:#0D1626;--bg-card2:#111D35;--text:#E8F0FF;--text-muted:#7A90B8;--border:rgba(0,87,255,0.2);--success:#00E676;--warning:#FFB300;--danger:#FF3D57;--gold:#FFD700;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg-dark);}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}

/* TOAST & LOADER */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;align-items:center;}
.toast{background:linear-gradient(135deg,var(--bg-card2),#1a2a4a);border:1px solid var(--primary);border-radius:12px;padding:14px 24px;color:var(--text);font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,87,255,0.3);display:flex;align-items:center;gap:10px;min-width:280px;animation:toastIn 0.4s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

#loader{position:fixed;inset:0;background:var(--bg-dark);z-index:99998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.loader-logo{font-family:'Orbitron',monospace;font-size:2.5rem;font-weight:900;color:var(--primary);text-shadow:0 0 30px var(--primary);}
.loader-bar{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.loader-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));animation:loadFill 1.5s ease forwards;}
@keyframes loadFill{from{width:0}to{width:100%}}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(5,10,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:70px;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px var(--primary-glow);}
.logo-text{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;color:var(--text);}
.search-box{flex:1;max-width:500px;position:relative;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 16px 10px 44px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

/* DOWNLOAD APP BUTTONS (NEW) */
.app-download-bar { background: var(--bg-card2); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 1350px; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
.download-btn { padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 14px; transition: 0.3s; }
.btn-android { background: #3DDC84; color: #000; }
.btn-ios { background: #555; color: #ccc; cursor: not-allowed; }

/* SLIDER & SECTIONS */
.slider-section{margin-top:70px;position:relative;overflow:hidden;height:420px;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 0.8s ease;display:flex;align-items:center;justify-content:center;}
.slide.active{opacity:1;}
.slide-content{position:relative;z-index:2;text-align:center;padding:40px;}
.slide-content h2{font-size:2.5rem;font-weight:900;margin-bottom:10px;}
.section{max-width:1400px;margin:0 auto;padding:40px 24px;}
.section-title{font-size:1.6rem;font-weight:900;margin-bottom:24px;display:flex;align-items:center;gap:12px;}
.section-title::before{content:'';width:4px;height:28px;background:linear-gradient(180deg,var(--primary),var(--accent));border-radius:2px;}
.cats-grid{display:flex;gap:12px;flex-wrap:wrap; overflow-x: auto; padding-bottom: 10px;}
.cat-btn{padding:10px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);cursor:pointer; font-weight:600; white-space: nowrap;}
.cat-btn.active{background:var(--primary);color:#fff;}

/* PRODUCTS GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.3s;position:relative;}
.product-card:hover{transform:translateY(-6px);border-color:var(--primary);}
.product-img-wrap{height:200px;background:var(--bg-card2);overflow:hidden;position:relative;}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;}
.product-info{padding:16px;}
.product-name{font-weight:700;font-size:15px;margin-bottom:6px;}
.product-price{font-size:1.2rem;font-weight:900;color:var(--primary);}

/* CART PANEL */
.cart-panel{position:fixed;left:0;top:0;height:100%;width:420px;max-width:100%;background:var(--bg-card);border-right:1px solid var(--border);z-index:3001;transform:translateX(-100%);transition:transform 0.4s ease;display:flex;flex-direction:column;}
.cart-panel.open{transform:translateX(0);}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;display:none;}
.cart-overlay.open{display:block;}
.cart-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.cart-items-list{flex:1;overflow-y:auto;padding:16px;}
.cart-item{background:var(--bg-card2);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;gap:12px;align-items:center;}
.cart-item-img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
.coupon-box { display: flex; gap: 8px; margin-bottom: 15px; }
.coupon-box input { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: #fff; outline: none; }
.cart-footer{padding:20px 24px;border-top:1px solid var(--border);}

/* RESPONSIVE */
@media(max-width:768px){
  .slider-section { height: 300px; }
  .slide-content h2 { font-size: 1.6rem; }
  .products-grid{grid-template-columns:repeat(2, 1fr); gap: 10px;}
  .product-img-wrap { height: 160px; }
  .nav-inner { padding: 0 10px; }
  .search-box { max-width: 150px; }
  .logo-text { font-size: 1rem; }
}
</style>
</head>
<body>

<div id="loader"><div class="loader-logo">⚡ TECHSTORE</div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>
<div id="toast-container"></div>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="filterCat('الكل')">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">TECHSTORE</div>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="ابحث هنا..." oninput="liveSearch(this.value)">
    </div>
    <div class="nav-actions">
      <button class="btn" style="background:var(--primary); color:white; border-radius:10px; position:relative;" onclick="openCart()">
        <i class="fas fa-shopping-cart"></i> <span id="cart-count-text">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="slider-section">
  <div class="slide active">
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#050A14,#001a4d);"></div>
    <div class="slide-content">
      <h2>⚡ أحدث التقنيات 2026</h2>
      <p>أفضل العروض والأسعار الحصرية</p>
    </div>
  </div>
</div>

<div class="app-download-bar" data-aos="fade-up">
    <span style="font-weight:700; color:var(--accent)">حمّل تطبيقنا:</span>
    <a href="#" class="download-btn btn-android"><i class="fab fa-android"></i> Android</a>
    <a href="#" class="download-btn btn-ios"><i class="fab fa-apple"></i> iOS (قريباً)</a>
</div>

<div class="section">
  <h2 class="section-title">الأقسام</h2>
  <div class="cats-grid">
    <button class="cat-btn active" onclick="filterCat('الكل')">الكل</button>
    <button class="cat-btn" onclick="filterCat('موبايلات')">موبايلات</button>
    <button class="cat-btn" onclick="filterCat('لابتوبات')">لابتوبات</button>
    <button class="cat-btn" onclick="filterCat('سماعات')">سماعات</button>
  </div>
</div>

<div class="section" style="padding-top:0">
  <div class="products-grid" id="products-grid"></div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h3>سلة التسوق</h3>
    <i class="fas fa-times" onclick="closeCart()" style="cursor:pointer"></i>
  </div>
  <div class="cart-items-list" id="cart-items-container"></div>
  <div class="cart-footer">
    <div class="coupon-box">
        <input type="text" id="coupon-code" placeholder="كود الخصم">
        <button class="btn" style="background:var(--accent); color:#000" onclick="applyCoupon()">تطبيق</button>
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:900; font-size:1.2rem;">
        <span>الإجمالي:</span><span id="cart-total-price">0 جنيه</span>
    </div>
    <input type="text" id="c-name" placeholder="الاسم" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; background:var(--bg-card2); border:1px solid var(--border); color:#fff;">
    <input type="tel" id="c-phone" placeholder="الموبايل" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; background:var(--bg-card2); border:1px solid var(--border); color:#fff;">
    <button class="btn" style="width:100%; background:var(--primary); color:#fff; padding:12px" onclick="confirmOrder()">تأكيد الطلب</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allProducts={}, cart=[], currentDiscount=0;

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`);return await r.json();}

function toast(msg,type='info'){
  const t=document.createElement('div');t.className=`toast ${type}`;
  t.innerHTML=`<span>${msg}</span>`; document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

async function loadProducts(){
  const data=await fbGet('products'); allProducts=data||{}; renderProducts();
}

function renderProducts(filter=null){
  const grid=document.getElementById('products-grid');
  let entries=Object.entries(allProducts);
  if(filter) entries=entries.filter(([,v])=>v.name.toLowerCase().includes(filter.toLowerCase()));
  grid.innerHTML=entries.map(([id,p])=>`
    <div class="product-card" onclick="addToCart('${id}')">
      <div class="product-img-wrap"><img src="${p.img1 || ''}" onerror="this.src='https://placehold.co/300x200?text=📦'"></div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${Number(p.price).toLocaleString()} جنيه</div>
      </div>
    </div>`).join('');
}

function addToCart(id){
    const p = allProducts[id];
    const exist = cart.find(item => item.id === id);
    if(exist) exist.qty++; else cart.push({...p, id, qty: 1});
    updateCartUI(); toast('أضيف للسلة');
}

async function applyCoupon() {
    const code = document.getElementById('coupon-code').value.trim().toUpperCase();
    const data = await fbGet(`coupons/${code}`);
    if(data) { currentDiscount = data.value; toast('تم تطبيق الخصم!', 'success'); } 
    else { currentDiscount = 0; toast('كود خطأ', 'error'); }
    updateCartUI();
}

function updateCartUI(){
    const list = document.getElementById('cart-items-container');
    let subtotal = cart.reduce((s,c)=>s+c.price*c.qty,0);
    let total = subtotal - (subtotal * currentDiscount);
    document.getElementById('cart-total-price').textContent = `${total.toLocaleString()} جنيه`;
    document.getElementById('cart-count-text').textContent = cart.length;
    list.innerHTML = cart.map(c=>`<div class="cart-item">
        <img src="${c.img1}" class="cart-item-img">
        <div><div>${c.name}</div><div>${c.price} ج × ${c.qty}</div></div>
    </div>`).join('');
}

async function confirmOrder(){
    const name = document.getElementById('c-name').value;
    const phone = document.getElementById('c-phone').value;
    if(!name || !phone || !cart.length) return toast('أكمل البيانات');
    
    const orderData = { name, phone, items: cart, total: cart.reduce((s,c)=>s+c.price*c.qty,0) * (1-currentDiscount), time: new Date().toLocaleString('ar-EG') };
    await fetch(`${DB}/orders.json`, {method:'POST', body:JSON.stringify(orderData)});
    
    const msg = encodeURIComponent(`طلب جديد: ${name}\nالمنتجات:\n${cart.map(c=>`- ${c.name} (${c.qty})`).join('\n')}`);
    window.open(`https://wa.me/201121189810?text=${msg}`);
    cart=[]; updateCartUI(); closeCart(); toast('تم طلبك بنجاح');
}

function openCart(){ document.getElementById('cart-panel').classList.add('open'); document.getElementById('cart-overlay').classList.add('open'); }
function closeCart(){ document.getElementById('cart-panel').classList.remove('open'); document.getElementById('cart-overlay').classList.remove('open'); }

window.onload = () => { loadProducts(); AOS.init(); setTimeout(()=>document.getElementById('loader').style.display='none', 1000); };
</script>
</body>
</html>
