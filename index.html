<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE ⚡</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
    background:#0b0b0f;
    color:#fff;
}

/* ⚡ خلفية اللوجو */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url("logo.png") center/cover no-repeat;
    opacity:0.12;
    z-index:-2;
}

/* ⚡ وميض */
.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,#00f0ff,#0044ff);
    opacity:0;
    z-index:-1;
    animation:flash 6s infinite;
}

@keyframes flash{
    0%,90%,100%{opacity:0}
    92%{opacity:.3}
    94%{opacity:0}
    96%{opacity:.4}
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:40px;
    border-radius:50%;
    box-shadow:0 0 20px #00f0ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px #00f0ff}
    to{box-shadow:0 0 25px #00f0ff}
}

.btn{
    background:#00f0ff;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

/* Hero */
.hero{
    text-align:center;
    padding:60px 20px;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00f0ff;
}

.card img{
    width:100%;
    border-radius:10px;
}

/* Cart */
.cart{
    position:fixed;
    right:-100%;
    top:0;
    width:300px;
    height:100%;
    background:#111;
    padding:20px;
    transition:.3s;
}

.cart.active{right:0}

</style>
</head>

<body>

<div class="bg"></div>
<div class="flash"></div>

<header>
<div class="logo">
<img src="logo.png">
<h3>TECHSTORE ⚡</h3>
</div>

<div>
<a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk">
<button class="btn">Android</button>
</a>
<button class="btn">iOS قريباً</button>
<button class="btn" onclick="toggleCart()">🛒</button>
</div>
</header>

<section class="hero">
<h1>⚡ أقوى متجر إلكترونيات</h1>
<p>تصميم نيون + سرعة صاروخ</p>
</section>

<section class="products" id="products"></section>

<div class="cart" id="cart">
<h3>السلة</h3>
<div id="items"></div>
<hr>
<p>الإجمالي: <span id="total">0</span></p>
<button class="btn" onclick="order()">اطلب واتساب</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"موبايل",price:5000,img:"https://via.placeholder.com/150"},
{name:"لاب توب",price:15000,img:"https://via.placeholder.com/150"}
];

let cart=[];

/* عرض */
function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} جنيه</p>
<button class="btn" onclick="add(${i})">أضف</button>
</div>`;
});
products.innerHTML=html;
}
render();

/* سلة */
function add(i){
cart.push(products[i]);
update();
}

function update(){
let html="",total=0;
cart.forEach(p=>{
html+=`<p>${p.name} - ${p.price}</p>`;
total+=p.price;
});
items.innerHTML=html;
document.getElementById("total").innerText=total;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* طلب */
function order(){
let msg="طلب:%0A";
cart.forEach(p=>msg+=p.name+"%0A");
window.open("https://wa.me/201000000000?text="+msg);
}

</script>

</body>
</html>
