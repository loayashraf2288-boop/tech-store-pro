<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTORE - Premium Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--primary-dark:#0040CC;--primary-glow:rgba(0,87,255,0.3);--accent:#00D4FF;--bg-dark:#050A14;--bg-card:#0D1626;--bg-card2:#111D35;--text:#E8F0FF;--text-muted:#7A90B8;--border:rgba(0,87,255,0.2);--success:#00E676;--warning:#FFB300;--danger:#FF3D57;--gold:#FFD700;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg-dark);}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}

/* TOAST */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;align-items:center;}
.toast{background:var(--bg-card2);border:1px solid var(--primary);border-radius:12px;padding:14px 24px;color:var(--text);font-size:14px;font-weight:600;box-shadow:0 8px 32px var(--primary-glow);display:flex;align-items:center;gap:10px;min-width:280px;animation:fadeInDown 0.4s ease;}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(5,10,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:70px;display:flex;align-items:center;}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;width:100%;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;color:var(--text);}
.search-box{flex:1;max-width:400px;position:relative;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 44px 10px 16px;color:var(--text);outline:none;transition:0.3s;}
.search-box i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

/* SLIDER */
.slider-section{margin-top:70px;height:420px;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:0.8s;display:flex;align-items:center;justify-content:center;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1;}

/* DOWNLOAD CARD */
.download-card{background:var(--bg-card2);border:1px solid var(--border);border-radius:15px;padding:20px;text-align:center;transition:0.3s;cursor:pointer;}
.download-card:hover{border-color:var(--primary);transform:translateY(-5px);box-shadow:0 5px 15px var(--primary-glow);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;max-width:860px;width:100%;max-height:90vh;overflow-y:auto;}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.thumb{aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.thumb.active{border-color:var(--primary);}
</style>
</head>
<body>

<div id="toast-container"></div>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="location.reload()">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">TECHSTORE</div>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="ابحث عن منتج..." oninput="liveSearch(this.value)">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn" style="background:var(--primary);color:#fff;border:none;padding:8px 15px;border-radius:10px;cursor:pointer;font-weight:700" onclick="openDL()">📥 التطبيق</button>
      <button class="btn" style="background:var(--bg-card2);color:#fff;border:1px solid var(--border);padding:8px 15px;border-radius:10px;cursor:pointer;position:relative" onclick="openCart()">
        <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="slider-section" id="main-slider"></div>

<div style="max-width:1400px;margin:0 auto;padding:40px 24px;">
  <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:30px">
    <button class="btn" onclick="filterCat('الكل')" style="background:var(--primary);color:#fff;padding:10px 25px;border-radius:10px;border:none;white-space:nowrap;cursor:pointer">الكل</button>
    </div>
  <h2 style="margin-bottom:24px;border-right:4px solid var(--primary);padding-right:15px">جميع المنتجات</h2>
  <div id="products-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;"></div>
</div>

<div class="modal-overlay" id="dl-modal" onclick="closeModal('dl-modal')">
  <div class="modal" style="max-width:400px" onclick="event.stopPropagation()">
    <div style="padding:20px;text-align:center">
      <h3 style="margin-bottom:20px">تحميل تطبيق TECHSTORE ⚡</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
        <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" download class="download-card" style="text-decoration:none">
          <i class="fab fa-android" style="font-size:40px;color:var(--success)"></i>
          <div style="color:#fff;margin-top:10px;font-weight:700">Android</div>
          <div style="font-size:10px;color:var(--success)">تحميل مباشر APK</div>
        </a>
        <div class="download-card" onclick="toast('قريباً على App Store 🍏','info')">
          <i class="fab fa-apple" style="font-size:40px;color:#fff"></i>
          <div style="color:#fff;margin-top:10px;font-weight:700">iOS</div>
          <div style="font-size:10px;color:var(--warning)">قريباً...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="product-modal" onclick="closeModal('product-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-body">
      <div>
        <img id="m-img" style="width:100%;border-radius:15px;aspect-ratio:1;object-fit:cover;background:var(--bg-card2)">
        <div class="thumb-grid" id="m-thumbs"></div>
      </div>
      <div>
        <h2 id="m-name" style="color:var(--primary);margin-bottom:10px"></h2>
        <div id="m-price" style="font-size:28px;font-weight:900;color:var(--primary);margin-bottom:15px"></div>
        <p id="m-desc" style="color:var(--text-muted);line-height:1.7;margin-bottom:25px"></p>
        <button class="btn" style="width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:900;cursor:pointer" onclick="addToCart()">أضف للسلة 🛒</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allProducts = {}, cart = [], currentPID = null;

async function fbGet(p){try{const r=await fetch(`${DB}/${p}.json`);return await r.json();}catch{return null;}}

function toast(msg, type='success'){
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast animate__animated animate__fadeInDown`;
  t.innerHTML = `<span>⚡</span> <span>${msg}</span>`;
  container.appendChild(t);
  setTimeout(()=>{ t.remove(); }, 3000);
}

async function load(){
  const [prods, ads] = await Promise.all([fbGet('products'), fbGet('ads')]);
  allProducts = prods || {};
  renderProds();
  renderSlider(ads);
  AOS.init();
}

function renderSlider(ads){
  const slider = document.getElementById('main-slider');
  if(!ads) return;
  const items = Object.values(ads);
  slider.innerHTML = items.map((ad,i)=>`<div class="slide ${i===0?'active':''}"><img src="${ad.img}"></div>`).join('');
  let cur = 0;
  setInterval(()=>{
    const slides = document.querySelectorAll('.slide');
    if(slides.length<2) return;
    slides[cur].classList.remove('active');
    cur = (cur+1)%slides.length;
    slides[cur].classList.add('active');
  }, 4000);
}

function renderProds(){
  const grid = document.getElementById('products-grid');
  grid.innerHTML = Object.entries(allProducts).map(([id,p])=>`
    <div class="product-card" onclick="openP('${id}')" data-aos="fade-up">
      <img src="${p.img1}" style="width:100%;aspect-ratio:1;object-fit:cover">
      <div style="padding:15px">
        <div style="font-weight:700;font-size:14px">${p.name}</div>
        <div style="color:var(--primary);font-weight:900;margin-top:5px">${Number(p.price).toLocaleString()} ج</div>
      </div>
    </div>`).join('');
}

function openP(id){
  const p = allProducts[id]; currentPID = id;
  document.getElementById('m-name').textContent = p.name;
  document.getElementById('m-price').textContent = Number(p.price).toLocaleString() + " جنيه";
  document.getElementById('m-desc').textContent = p.desc || 'لا يوجد وصف متاح.';
  document.getElementById('m-img').src = p.img1;
  const imgs = [p.img1,p.img2,p.img3,p.img4,p.img5,p.img6,p.img7,p.img8].filter(Boolean);
  document.getElementById('m-thumbs').innerHTML = imgs.map(img=>`<img src="${img}" class="thumb" onclick="document.getElementById('m-img').src='${img}'">`).join('');
  document.getElementById('product-modal').classList.add('open');
}

function addToCart(){
  toast("تمت الإضافة للسلة بنجاح! ✅");
  cart.push(allProducts[currentPID]);
  document.getElementById('cart-count').textContent = cart.length;
  closeModal('product-modal');
}

function liveSearch(q){
    const entries = Object.entries(allProducts).filter(([id,p])=>p.name.toLowerCase().includes(q.toLowerCase()));
    const grid = document.getElementById('products-grid');
    grid.innerHTML = entries.map(([id,p])=>`
    <div class="product-card" onclick="openP('${id}')">
      <img src="${p.img1}" style="width:100%;aspect-ratio:1;object-fit:cover">
      <div style="padding:15px">
        <div style="font-weight:700;font-size:14px">${p.name}</div>
        <div style="color:var(--primary);font-weight:900;margin-top:5px">${p.price} ج</div>
      </div>
    </div>`).join('');
}

function openDL(){ document.getElementById('dl-modal').classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function openCart(){ toast("السلة قيد التطوير للربط بالواتساب..", "info"); }

window.onload = load;
</script>
</body>
</html>
