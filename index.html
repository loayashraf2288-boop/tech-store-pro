<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TECHSTORE - Premium Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--primary:#0057FF;--primary-dark:#0040CC;--primary-glow:rgba(0,87,255,0.3);--accent:#00D4FF;--bg-dark:#050A14;--bg-card:#0D1626;--bg-card2:#111D35;--text:#E8F0FF;--text-muted:#7A90B8;--border:rgba(0,87,255,0.2);--success:#00E676;--warning:#FFB300;--danger:#FF3D57;--gold:#FFD700;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg-dark);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg-dark);}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}

/* TOAST */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none;}
.toast{background:linear-gradient(135deg,var(--bg-card2),#1a2a4a);border:1px solid var(--primary);border-radius:12px;padding:12px 20px;color:var(--text);font-size:13px;font-weight:600;box-shadow:0 8px 32px var(--primary-glow);display:flex;align-items:center;gap:10px;min-width:260px;animation:fadeInDown 0.4s ease;}

/* NAV & RESPONSIVE */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(5,10,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:70px;padding:0 15px;}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:100%;gap:10px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 15px var(--primary-glow);}
.logo-text{font-family:'Orbitron';font-size:1.1rem;font-weight:900;color:#fff;}
.search-box{flex:1;max-width:400px;position:relative;}
.search-box input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 35px 8px 12px;color:#fff;outline:none;font-size:13px;}
.search-box i{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

@media(max-width:600px){
  .logo-text{display:none;}
  .search-box{max-width:160px;}
  .logo-sub{display:none;}
}

/* SLIDER */
.slider-section{margin-top:70px;height:350px;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;opacity:0;transition:0.8s;display:flex;align-items:center;justify-content:center;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;position:absolute;}

/* DOWNLOAD BUTTONS */
.btn-dl{width:100%; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:10px; font-weight:700; text-decoration:none; transition:0.3s;}
.btn-soon{opacity:0.6; cursor:not-allowed; border:1px solid var(--border); color:var(--text-muted); position:relative; overflow:hidden;}
.btn-soon::after{content:'قريباً'; position:absolute; top:5px; right:-20px; background:var(--warning); color:#000; font-size:10px; padding:2px 20px; transform:rotate(45deg);}

/* REST OF CSS (FROM PREVIOUS CODE) */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:20px;}
.product-card{background:var(--bg-card);border-radius:15px;overflow:hidden;border:1px solid var(--border);transition:0.3s;}
.product-card img{width:100%;aspect-ratio:1;object-fit:cover;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;align-items:center;justify-content:center;padding:15px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-card);border-radius:20px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;}
</style>
</head>
<body>

<div id="toast-container"></div>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="location.reload()">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">TECHSTORE</div>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="بحث..." oninput="liveSearch(this.value)">
    </div>
    <div style="display:flex; gap:8px;">
      <button onclick="openDL()" style="background:var(--primary); border:none; color:#fff; padding:8px 12px; border-radius:8px; font-weight:700; cursor:pointer;"><i class="fas fa-download"></i></button>
      <button onclick="openCart()" style="background:var(--bg-card2); border:1px solid var(--border); color:#fff; padding:8px 12px; border-radius:8px; position:relative; cursor:pointer;">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-badge" style="position:absolute; top:-5px; right:-5px; background:red; font-size:10px; padding:2px 5px; border-radius:50%; display:none;">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="slider-section" id="main-slider"></div>

<div style="padding:20px;">
  <h2 style="margin-bottom:15px; border-right:4px solid var(--primary); padding-right:10px;">أحدث العروض</h2>
  <div id="products-grid" class="products-grid"></div>
</div>

<div class="modal-overlay" id="dl-modal" onclick="closeDL()">
  <div class="modal" style="max-width:400px;" onclick="event.stopPropagation()">
    <div style="padding:30px; text-align:center;">
      <h3 style="margin-bottom:20px;">تحميل تطبيق TECHSTORE ⚡</h3>
      <a href="https://github.com/loayashraf2288-boop/tech-store-pro/releases/download/v1.0/_TECH_STORE_19748700.apk" download class="btn-dl" style="background:var(--primary); color:#fff;">
        <i class="fab fa-android" style="font-size:24px;"></i> تحميل للأندرويد (APK)
      </a>
      <div class="btn-dl btn-soon">
        <i class="fab fa-apple" style="font-size:24px;"></i> نسخة الأيفون (iOS)
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="p-modal" onclick="closeP()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="padding:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px;">
      <div>
        <img id="m-img" style="width:100%; border-radius:15px; aspect-ratio:1; object-fit:cover;">
        <div id="m-thumbs" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-top:10px;"></div>
      </div>
      <div>
        <h2 id="m-name" style="color:var(--primary);"></h2>
        <div id="m-price" style="font-size:24px; font-weight:900; margin:10px 0;"></div>
        <p id="m-desc" style="color:var(--text-muted); font-size:14px; line-height:1.6;"></p>
        <button onclick="addCart()" style="width:100%; margin-top:20px; background:var(--primary); color:#fff; border:none; padding:15px; border-radius:10px; font-weight:900; cursor:pointer;">أضف للسلة</button>
      </div>
    </div>
  </div>
</div>

<script>
const DB="https://store-c8993-default-rtdb.firebaseio.com";
let allProducts={}, cart=[], curPID=null, discountPerc=0;

async function fbGet(p){const r=await fetch(`${DB}/${p}.json`); return await r.json();}

function toast(msg){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<span>⚡</span> ${msg}`;
  c.appendChild(t); setTimeout(()=>t.remove(), 3000);
}

async function load(){
  const [p, a] = await Promise.all([fbGet('products'), fbGet('ads')]);
  allProducts=p||{};
  renderSlider(a);
  renderProds();
}

function renderSlider(ads){
  const s=document.getElementById('main-slider');
  if(!ads) return;
  const items=Object.values(ads);
  s.innerHTML=items.map((ad,i)=>`<div class="slide ${i===0?'active':''}"><img src="${ad.img}"></div>`).join('');
  let cur=0;
  setInterval(()=>{
    const slides=document.querySelectorAll('.slide');
    if(slides.length<2) return;
    slides[cur].classList.remove('active');
    cur=(cur+1)%slides.length;
    slides[cur].classList.add('active');
  }, 4000);
}

function renderProds(){
  const g=document.getElementById('products-grid');
  g.innerHTML=Object.entries(allProducts).map(([id,p])=>`
    <div class="product-card" onclick="openP('${id}')">
      <img src="${p.img1}">
      <div style="padding:10px;">
        <div style="font-weight:700; font-size:13px;">${p.name}</div>
        <div style="color:var(--primary); font-weight:900;">${Number(p.price).toLocaleString()} ج</div>
      </div>
    </div>`).join('');
}

function openP(id){
  const p=allProducts[id]; curPID=id;
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-price').textContent=Number(p.price).toLocaleString()+" جنيه";
  document.getElementById('m-desc').textContent=p.desc;
  document.getElementById('m-img').src=p.img1;
  const imgs=[p.img1,p.img2,p.img3,p.img4,p.img5,p.img6,p.img7,p.img8].filter(Boolean);
  document.getElementById('m-thumbs').innerHTML=imgs.map(img=>`<img src="${img}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:5px; cursor:pointer;" onclick="document.getElementById('m-img').src='${img}'">`).join('');
  document.getElementById('p-modal').classList.add('open');
}

function addCart(){
  cart.push(allProducts[curPID]);
  document.getElementById('cart-badge').style.display='block';
  document.getElementById('cart-badge').textContent=cart.length;
  toast("تمت الإضافة للسلة! ✅");
  closeP();
}

function openDL(){ document.getElementById('dl-modal').classList.add('open'); }
function closeDL(){ document.getElementById('dl-modal').classList.remove('open'); }
function closeP(){ document.getElementById('p-modal').classList.remove('open'); }
function openCart(){ toast("السلة قيد التفعيل.. سيتم الربط بالواتساب."); }

window.onload=load;
</script>
</body>
</html>
